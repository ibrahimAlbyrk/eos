name: EosRemote

options:
  bundleIdPrefix: dev.eos.remote
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# Highlightr wraps highlight.js (same engine + github-dark-dimmed theme as the Mac) → exact-match
# code highlighting. swift-markdown is cmark-gfm (the GFM family the Mac's Marked uses); it only
# ships toolchain snapshot tags, so it's pinned to an immutable revision for a reproducible build.
packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    from: "2.2.0"
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    revision: c519011e10582d5585f20b2b38dfb4920ae03b13

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "YES"
    # Automatic signing so a plug-in-and-Run works on the user's device. The user may swap
    # DEVELOPMENT_TEAM (+ the bundle ids below) for their own per design §9 — identity is per-build.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MW57K22389

targets:
  # The testable core: transport, models, data layer. Zero UIKit.
  # Mirrors the repo's contracts→core→infra layering — the transport is isolated from the UI.
  EosRemoteKit:
    type: framework
    platform: iOS
    sources:
      - path: EosRemoteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eos.remote.kit
        ENABLE_TESTABILITY: "YES"

  EosRemote:
    type: application
    platform: iOS
    sources:
      - path: EosRemote
    # A generated Info.plist so UIAppFonts (an array) can register the bundled JetBrains Mono.
    # The keys the root settings' GENERATE_INFOPLIST_FILE used to inject are declared here instead.
    info:
      path: EosRemote/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "Scan the pairing QR shown by the Eos Mac app."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
          - JetBrainsMono-Bold.ttf
          - PlusJakartaSans-Regular.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Bold.ttf
          - PlusJakartaSans-Italic.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eos.remote.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: EosRemoteKit
      - package: Highlightr
        product: Highlightr
      - package: swift-markdown
        product: Markdown

  EosRemoteKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EosRemoteKitTests
    dependencies:
      - target: EosRemoteKit

schemes:
  EosRemote:
    build:
      targets:
        EosRemote: all
        EosRemoteKit: all
    test:
      targets:
        - EosRemoteKitTests
  EosRemoteKit:
    build:
      targets:
        EosRemoteKit: all
    test:
      targets:
        - EosRemoteKitTests
