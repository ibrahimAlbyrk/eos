name: EosRemote

options:
  bundleIdPrefix: dev.eos.remote
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "YES"
    # Automatic signing so a plug-in-and-Run works on the user's device. The user may swap
    # DEVELOPMENT_TEAM (+ the bundle ids below) for their own per design §9 — identity is per-build.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MW57K22389

targets:
  # The testable core: transport, models, data layer. Zero UIKit.
  # Mirrors the repo's contracts→core→infra layering — the transport is isolated from the UI.
  EosRemoteKit:
    type: framework
    platform: iOS
    sources:
      - path: EosRemoteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eos.remote.kit
        ENABLE_TESTABILITY: "YES"

  EosRemote:
    type: application
    platform: iOS
    sources:
      - path: EosRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eos.remote.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan the pairing QR shown by the Eos Mac app."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: EosRemoteKit

  EosRemoteKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EosRemoteKitTests
    dependencies:
      - target: EosRemoteKit

schemes:
  EosRemote:
    build:
      targets:
        EosRemote: all
        EosRemoteKit: all
    test:
      targets:
        - EosRemoteKitTests
  EosRemoteKit:
    build:
      targets:
        EosRemoteKit: all
    test:
      targets:
        - EosRemoteKitTests
