<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eos · Settings · Model — Variant 4 (Table + Slide-over Drawer)</title>
<style>
/* ============================================================
   Eos design tokens (mirrors app/ui/src/styles.css :root)
   System font stack stands in for Plus Jakarta Sans / JetBrains
   Mono — zero external requests.
   ============================================================ */
:root {
  color-scheme: dark;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-xl: 1.0625rem;
  --bg: #1a1a1a;
  --surface: #1f1f1f;
  --surface-2: #252525;
  --surface-3: #2c2c2c;
  --border: #262626;
  --fg: #ebebeb;
  --fg-mid: #c4c4c4;
  --fg-dim: #8a8a8a;
  --fg-faint: #5a5a5a;
  --accent: #6ea4e8;
  --accent-hover: #8ab9f0;
  --ok: #67c084;
  --warn: #d4a55a;
  --err: #d97670;
  --violet: #c8a2ff;
  --tint: 255, 255, 255;
  --glass: 30, 30, 30;
  --solid-btn-bg: #e8e8e8;
  --solid-btn-fg: #1a1a1a;
  --solid-btn-bg-hover: #fff;
  --panel-radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-ui);
  font-size: var(--text-base);
  line-height: 1.55;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; background: none; border: 0; color: inherit; padding: 0; }
input { font-family: inherit; color: inherit; background: none; border: 0; outline: none; }
input::placeholder { color: var(--fg-faint); }
* { scrollbar-width: thin; scrollbar-color: rgba(var(--tint), 0.14) transparent; }

/* ---- faint fake dashboard behind the glass modal ---- */
.backdrop-app { position: fixed; inset: 0; }
.backdrop-app .panel { position: absolute; border-radius: var(--panel-radius); background: var(--surface); }
.backdrop-app .p1 { left: 6px; top: 6px; bottom: 6px; width: 230px; background: var(--surface-2); }
.backdrop-app .p2 { right: 6px; top: 6px; bottom: 6px; width: 300px; }
.backdrop-app .bar { position: absolute; height: 9px; border-radius: 5px; background: rgba(var(--tint), 0.05); }

/* ============================================================
   Settings overlay + glass modal (mirrors .stg-overlay/.stg-modal)
   ============================================================ */
.stg-overlay {
  position: fixed; inset: 0; z-index: 450;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.stg-modal {
  /* widened vs the live 760px modal — the table variant earns its columns */
  width: min(880px, calc(100vw - 48px));
  height: min(600px, calc(100vh - 96px));
  display: flex; overflow: hidden; position: relative;
  background: rgba(var(--glass), 0.88);
  backdrop-filter: blur(40px) saturate(170%);
  -webkit-backdrop-filter: blur(40px) saturate(170%);
  border-radius: var(--panel-radius);
  box-shadow: inset 0 1px 0 rgba(var(--tint), 0.06), inset 0 0 0 1px rgba(var(--tint), 0.05), 0 24px 80px rgba(0, 0, 0, 0.5);
}
.stg-nav {
  width: 188px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 2px;
  padding: 12px 10px;
  border-right: 1px solid rgba(var(--tint), 0.07);
}
.stg-search {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 9px; margin-bottom: 10px; border-radius: 7px;
  background: rgba(var(--tint), 0.05); color: var(--fg-faint);
  font-size: var(--text-sm);
}
.stg-nav__label {
  padding: 4px 9px 5px; font-size: var(--text-xs);
  text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-mono); color: var(--fg-faint);
}
.stg-nav__item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 7px;
  font-size: var(--text-base); color: var(--fg-dim); text-align: left;
}
.stg-nav__item:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }
.stg-nav__item.is-active { background: rgba(var(--tint), 0.08); color: var(--fg); }
.stg-nav__item svg { flex-shrink: 0; }
.stg-body { flex: 1; min-width: 0; overflow-y: auto; padding: 22px 26px; }
.stg-close {
  position: absolute; top: 12px; right: 12px; width: 26px; height: 26px;
  border-radius: 6px; color: var(--fg-faint);
  display: inline-flex; align-items: center; justify-content: center; z-index: 2;
}
.stg-close:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }

.stg-titlebar { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 16px; }
.stg-title { margin: 0; font-size: var(--text-xl); font-weight: 600; letter-spacing: -0.01em; }
.stg-meta { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--fg-faint); }
.stg-meta b { color: var(--ok); font-weight: 500; }

/* ============================================================
   Provider TABLE — the compact scan surface
   ============================================================ */
.ptable { --cols: minmax(148px, 1.25fr) minmax(128px, 1.05fr) minmax(136px, 1.2fr) 104px 82px; }
.ptable__head {
  display: grid; grid-template-columns: var(--cols); gap: 14px;
  padding: 0 10px 7px;
  font-size: var(--text-xs); font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-faint);
  border-bottom: 1px solid rgba(var(--tint), 0.08);
}
.ptable__row {
  display: grid; grid-template-columns: var(--cols); gap: 14px; align-items: center;
  height: 37px; padding: 0 10px; border-radius: 7px;
  cursor: pointer;
  transition: background 100ms ease;
}
.ptable__row:hover { background: rgba(var(--tint), 0.05); }
.ptable__row.is-open { background: rgba(var(--tint), 0.07); box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.06); }
.ptable__row + .ptable__row { margin-top: 1px; }
.ptable__body { padding-top: 5px; }
.ptable__row.is-leaving { opacity: 0; transform: translateX(-8px); transition: opacity 180ms ease, transform 180ms ease; }

.cell { min-width: 0; }
.cell--name { display: flex; align-items: center; gap: 9px; font-size: var(--text-sm); color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-initial {
  width: 20px; height: 20px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 5px; font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  background: rgba(var(--tint), 0.07); color: var(--fg-mid);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.06);
}
.cell--mono {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--fg-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cell--model { color: var(--fg-mid); }

.auth-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px; border-radius: 5px;
  font-family: var(--font-mono); font-size: var(--text-xs); white-space: nowrap;
}
.auth-chip--key { color: var(--fg-mid); background: rgba(var(--tint), 0.06); box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07); }
.auth-chip--sub { color: var(--violet); background: color-mix(in srgb, var(--violet) 10%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--violet) 22%, transparent); }
.auth-chip--none { color: var(--fg-faint); }

.status { display: inline-flex; align-items: center; gap: 6px; font-size: var(--text-xs); font-family: var(--font-mono); white-space: nowrap; }
.status__dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status--ready { color: var(--ok); }
.status--ready .status__dot { background: var(--ok); box-shadow: 0 0 6px color-mix(in srgb, var(--ok) 55%, transparent); }
.status--none { color: var(--fg-faint); }
.status--none .status__dot { background: transparent; box-shadow: inset 0 0 0 1px var(--fg-faint); }

.ptable__add {
  display: flex; align-items: center; gap: 8px;
  width: 100%; margin-top: 7px; padding: 9px 10px;
  border-radius: 7px; border-top: 1px dashed rgba(var(--tint), 0.10);
  font-size: var(--text-sm); color: var(--fg-faint);
  transition: color 100ms ease, background 100ms ease;
}
.ptable__add:hover { color: var(--fg); background: rgba(var(--tint), 0.04); }

/* ============================================================
   SLIDE-OVER DRAWER — the full editor
   ============================================================ */
.drawer-dim {
  position: absolute; inset: 0; z-index: 5;
  background: rgba(0, 0, 0, 0.35);
  opacity: 0; pointer-events: none; transition: opacity 200ms ease;
}
.drawer-dim.is-on { opacity: 1; pointer-events: auto; }
.drawer {
  position: absolute; top: 0; right: 0; bottom: 0; z-index: 6;
  width: 342px; display: flex; flex-direction: column;
  background: rgba(38, 38, 38, 0.97);
  border-left: 1px solid rgba(var(--tint), 0.09);
  box-shadow: inset 0 1px 0 rgba(var(--tint), 0.05), -28px 0 60px rgba(0, 0, 0, 0.45);
  transform: translateX(103%);
  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
.drawer.is-open { transform: translateX(0); }

.drawer__head {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 14px;
  border-bottom: 1px solid rgba(var(--tint), 0.07);
}
.drawer__title { flex: 1; min-width: 0; font-size: var(--text-base); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer__pill {
  padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
}
.drawer__pill--ready { color: var(--ok); background: color-mix(in srgb, var(--ok) 12%, transparent); }
.drawer__pill--none { color: var(--fg-faint); background: rgba(var(--tint), 0.06); }
.drawer__close {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center; color: var(--fg-faint);
}
.drawer__close:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }
.drawer__scroll { flex: 1; overflow-y: auto; padding: 16px 18px 4px; }

.dsec + .dsec { margin-top: 22px; }
.dsec__title {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-mono); color: var(--fg-faint);
  padding-bottom: 6px; margin-bottom: 11px;
  border-bottom: 1px solid rgba(var(--tint), 0.07);
}

/* segmented auth-method switch (mirrors .stg-seg) */
.seg {
  display: flex; gap: 2px; padding: 2px; margin-bottom: 12px;
  border-radius: 8px; background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07);
}
.seg__btn {
  flex: 1; padding: 5px 0; border-radius: 6px;
  font-size: var(--text-xs); color: var(--fg-dim);
  transition: background 120ms ease, color 120ms ease, box-shadow 120ms ease;
}
.seg__btn:hover { color: var(--fg); }
.seg__btn.is-active {
  color: var(--fg); background: rgba(var(--tint), 0.10);
  box-shadow: inset 0 1px 0 rgba(var(--tint), 0.20), 0 1px 3px rgba(0, 0, 0, 0.25);
}

/* text inputs (mirrors .stg-input) */
.field { margin-bottom: 10px; }
.field__label { font-size: var(--text-xs); color: var(--fg-dim); margin-bottom: 5px; }
.finput {
  display: flex; align-items: center; gap: 6px;
  padding: 0 5px 0 11px; border-radius: 8px;
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  transition: background 120ms ease, box-shadow 120ms ease;
}
.finput:hover { background: rgba(var(--tint), 0.07); }
.finput:focus-within { background: rgba(var(--tint), 0.05); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent); }
.finput input { flex: 1; min-width: 0; padding: 7px 0; font-size: var(--text-xs); font-family: var(--font-mono); }
.finput__eye {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center; color: var(--fg-dim);
}
.finput__eye:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }
.field__hint { font-size: var(--text-xs); color: var(--fg-faint); margin-top: 5px; font-family: var(--font-mono); }
.field__hint--ok { color: var(--ok); }

.btn-solid {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 7px;
  font-size: var(--text-sm); font-weight: 500;
  background: var(--solid-btn-bg); color: var(--solid-btn-fg);
  transition: background 120ms ease, opacity 120ms ease;
}
.btn-solid:hover { background: var(--solid-btn-bg-hover); }
.btn-solid:disabled { opacity: 0.45; cursor: default; }
.btn-tint {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  width: 100%; padding: 8px 0; border-radius: 8px;
  font-size: var(--text-sm); color: var(--accent);
  background: color-mix(in srgb, var(--accent) 11%, transparent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent);
  transition: background 120ms ease;
}
.btn-tint:hover { background: color-mix(in srgb, var(--accent) 17%, transparent); }
.btn-ghost { font-size: var(--text-xs); color: var(--fg-dim); padding: 4px 9px; border-radius: 6px; }
.btn-ghost:hover { color: var(--fg); background: rgba(var(--tint), 0.06); }

/* subscription connected card */
.subcard {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; border-radius: 8px;
  background: color-mix(in srgb, var(--ok) 7%, transparent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ok) 18%, transparent);
}
.subcard__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex-shrink: 0; box-shadow: 0 0 7px color-mix(in srgb, var(--ok) 60%, transparent); }
.subcard__text { flex: 1; min-width: 0; }
.subcard__label { font-size: var(--text-xs); color: var(--ok); }
.subcard__account { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--fg-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sub-note { font-size: var(--text-xs); color: var(--fg-faint); margin-top: 8px; }

/* low-prominence remove */
.drawer__foot { padding: 10px 18px 16px; border-top: 1px solid rgba(var(--tint), 0.06); }
.rm-link { font-size: var(--text-xs); color: var(--fg-faint); transition: color 120ms ease; }
.rm-link:hover { color: var(--err); }
.rm-confirm { display: none; align-items: center; gap: 8px; font-size: var(--text-xs); color: var(--fg-dim); }
.rm-confirm.is-on { display: flex; }
.rm-confirm__yes { color: var(--err); padding: 3px 9px; border-radius: 5px; background: color-mix(in srgb, var(--err) 12%, transparent); }
.rm-confirm__yes:hover { background: color-mix(in srgb, var(--err) 20%, transparent); }

.spin { animation: spin 0.7s linear infinite; transform-origin: center; }
@keyframes spin { to { transform: rotate(360deg); } }

/* variant badge */
.variant-badge {
  position: fixed; right: 14px; bottom: 12px; z-index: 900;
  padding: 4px 10px; border-radius: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
  color: var(--fg-dim); background: var(--surface-2);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.10);
}
.variant-badge b { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<!-- faint dashboard mock behind the glass -->
<div class="backdrop-app" aria-hidden="true">
  <div class="panel p1"></div>
  <div class="panel p2"></div>
  <div class="bar" style="left:260px; top:40px;  width:340px;"></div>
  <div class="bar" style="left:260px; top:64px;  width:250px;"></div>
  <div class="bar" style="left:260px; top:88px;  width:410px;"></div>
  <div class="bar" style="left:30px;  top:60px;  width:170px;"></div>
  <div class="bar" style="left:30px;  top:90px;  width:140px;"></div>
</div>

<div class="stg-overlay">
  <div class="stg-modal">
    <button class="stg-close" title="Close settings">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
    </button>

    <!-- nav (matches live SETTINGS_SECTIONS: General / Model / Code) -->
    <nav class="stg-nav">
      <div class="stg-search">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
        Search settings
      </div>
      <div class="stg-nav__label">Settings</div>
      <button class="stg-nav__item">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="2.6"/><path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M12.4 3.6L11 5M5 11l-1.4 1.4"/></svg>
        General
      </button>
      <button class="stg-nav__item is-active">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2.2" y="2.2" width="11.6" height="11.6" rx="3"/><circle cx="8" cy="8" r="2.4"/></svg>
        Model
      </button>
      <button class="stg-nav__item">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 4.5L2 8l3.5 3.5M10.5 4.5L14 8l-3.5 3.5"/></svg>
        Code
      </button>
    </nav>

    <!-- body: title + provider table -->
    <div class="stg-body">
      <div class="stg-titlebar">
        <h2 class="stg-title">Providers</h2>
        <span class="stg-meta" id="meta-count"></span>
      </div>

      <div class="ptable">
        <div class="ptable__head">
          <span>Provider</span><span>Default model</span><span>Endpoint</span><span>Auth</span><span>Status</span>
        </div>
        <div class="ptable__body" id="tbody"></div>
        <button class="ptable__add" id="btn-add">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
          Add provider
        </button>
      </div>
    </div>

    <!-- dim + slide-over drawer -->
    <div class="drawer-dim" id="dim"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer__head">
        <span class="chip-initial" id="d-chip">A</span>
        <span class="drawer__title" id="d-title">Provider</span>
        <span class="drawer__pill" id="d-pill">ready</span>
        <button class="drawer__close" id="d-close" title="Close">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
      </div>

      <div class="drawer__scroll">
        <!-- name field, add-mode only -->
        <div class="dsec" id="d-namesec" style="display:none">
          <div class="dsec__title">Provider</div>
          <div class="field">
            <div class="field__label">Display name</div>
            <div class="finput"><input id="d-name" type="text" placeholder="My provider" spellcheck="false"></div>
          </div>
        </div>

        <div class="dsec">
          <div class="dsec__title">Authentication</div>
          <div class="seg">
            <button class="seg__btn is-active" id="seg-key">API key</button>
            <button class="seg__btn" id="seg-sub">Subscription</button>
          </div>

          <!-- API key pane -->
          <div id="pane-key">
            <div class="field">
              <div class="finput">
                <input id="d-key" type="password" placeholder="Paste your API key…" spellcheck="false" autocomplete="new-password">
                <button class="finput__eye" id="d-eye" title="Show">
                  <svg id="eye-open" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg id="eye-off" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M4 4l16 16"/></svg>
                </button>
              </div>
              <div class="field__hint" id="d-keyhint"></div>
            </div>
            <button class="btn-solid" id="d-save">Test &amp; Save</button>
          </div>

          <!-- Subscription pane -->
          <div id="pane-sub" style="display:none">
            <div id="sub-off">
              <button class="btn-tint" id="d-login">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3.5A1.5 1.5 0 0 0 2 4.5v7A1.5 1.5 0 0 0 3.5 13H6M10.5 5.5L13 8l-2.5 2.5M13 8H6"/></svg>
                Login with Subscription
              </button>
              <div class="sub-note">Opens the provider's sign-in — usage bills to your plan, no key stored.</div>
            </div>
            <div id="sub-on" style="display:none">
              <div class="subcard">
                <span class="subcard__dot"></span>
                <span class="subcard__text">
                  <span class="subcard__label">Connected</span><br>
                  <span class="subcard__account" id="d-account"></span>
                </span>
                <button class="btn-ghost" id="d-disconnect">Disconnect</button>
              </div>
            </div>
          </div>
        </div>

        <div class="dsec">
          <div class="dsec__title">Configuration</div>
          <div class="field">
            <div class="field__label">Endpoint</div>
            <div class="finput"><input id="d-endpoint" type="text" spellcheck="false" placeholder="api.example.com"></div>
          </div>
          <div class="field">
            <div class="field__label">Default model</div>
            <div class="finput"><input id="d-model" type="text" spellcheck="false" placeholder="model-id"></div>
          </div>
          <button class="btn-solid" id="d-addbtn" style="display:none">Add provider</button>
        </div>
      </div>

      <div class="drawer__foot" id="d-foot">
        <button class="rm-link" id="d-remove">Remove provider…</button>
        <div class="rm-confirm" id="d-rmconfirm">
          <span id="d-rmlabel">Remove?</span>
          <button class="rm-confirm__yes" id="d-rmyes">Remove</button>
          <button class="btn-ghost" id="d-rmno">Keep</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<div class="variant-badge"><b>VARIANT 4</b> · table + slide-over drawer</div>

<script>
// ---------------------------------------------------------------------------
// mock data — mirrors the shapes ModelSettings.jsx gets from backend presets
// ---------------------------------------------------------------------------
const providers = [
  { id: "anthropic", initial: "A", name: "Anthropic Claude", model: "claude-fable-5",         endpoint: "api.anthropic.com",                  auth: "sub",  account: "ibrahimalbayrak812@gmail.com" },
  { id: "deepseek",  initial: "D", name: "DeepSeek",         model: "deepseek-v4-flash",      endpoint: "api.deepseek.com",                   auth: "key",  keyTail: "8c1f" },
  { id: "openai",    initial: "O", name: "OpenAI",           model: "gpt-5.5",                endpoint: "api.openai.com",                     auth: "key",  keyTail: "4d9e" },
  { id: "gemini",    initial: "G", name: "Google Gemini",    model: "gemini-3.1-pro-preview", endpoint: "generativelanguage.googleapis.com",  auth: "key",  keyTail: "7q2m" },
  { id: "qwen",      initial: "Q", name: "Alibaba Qwen",     model: "qwen3.7-max",            endpoint: "dashscope-intl.aliyuncs.com",        auth: "none" },
  { id: "kimi",      initial: "K", name: "Moonshot Kimi",    model: "kimi-k2.6",              endpoint: "api.moonshot.ai",                    auth: "sub",  account: "ibrahimalbayrak812@gmail.com" },
  { id: "glm",       initial: "Z", name: "Zhipu GLM",        model: "glm-5.2",                endpoint: "api.z.ai",                           auth: "none" },
  { id: "grok",      initial: "X", name: "xAI Grok",         model: "grok-4.2",               endpoint: "api.x.ai",                           auth: "none" },
];

const $ = (id) => document.getElementById(id);
let openId = null;          // provider id in the drawer, or "__add__"
let seg = "key";            // active auth pane
let showKey = false;

// ---------------------------------------------------------------------------
// table rendering
// ---------------------------------------------------------------------------
function authChip(p) {
  if (p.auth === "key") return '<span class="auth-chip auth-chip--key">API key</span>';
  if (p.auth === "sub") return '<span class="auth-chip auth-chip--sub">Subscription</span>';
  return '<span class="auth-chip auth-chip--none">—</span>';
}
function statusCell(p) {
  return p.auth === "none"
    ? '<span class="status status--none"><span class="status__dot"></span>not set</span>'
    : '<span class="status status--ready"><span class="status__dot"></span>ready</span>';
}
function renderTable() {
  $("tbody").innerHTML = providers.map(p => `
    <div class="ptable__row${p.id === openId ? " is-open" : ""}" data-id="${p.id}" title="Edit ${p.name}">
      <span class="cell cell--name"><span class="chip-initial">${p.initial}</span>${p.name}</span>
      <span class="cell cell--mono cell--model">${p.model}</span>
      <span class="cell cell--mono">${p.endpoint}</span>
      <span class="cell">${authChip(p)}</span>
      <span class="cell">${statusCell(p)}</span>
    </div>`).join("");
  const ready = providers.filter(p => p.auth !== "none").length;
  $("meta-count").innerHTML = `<b>${ready}</b> of ${providers.length} ready`;
  document.querySelectorAll(".ptable__row").forEach(row =>
    row.addEventListener("click", () => openDrawer(row.dataset.id)));
}

// ---------------------------------------------------------------------------
// drawer
// ---------------------------------------------------------------------------
function setSeg(which) {
  seg = which;
  $("seg-key").classList.toggle("is-active", which === "key");
  $("seg-sub").classList.toggle("is-active", which === "sub");
  $("pane-key").style.display = which === "key" ? "" : "none";
  $("pane-sub").style.display = which === "sub" ? "" : "none";
}
function fillDrawer(p) {
  const adding = p === null;
  $("d-namesec").style.display = adding ? "" : "none";
  $("d-foot").style.display = adding ? "none" : "";
  $("d-addbtn").style.display = adding ? "" : "none";
  $("d-save").style.display = adding ? "none" : "";
  $("d-rmconfirm").classList.remove("is-on");
  $("d-remove").style.display = "";
  $("d-key").value = "";
  showKey = false; syncEye();

  if (adding) {
    $("d-chip").textContent = "+";
    $("d-title").textContent = "Add provider";
    $("d-pill").className = "drawer__pill drawer__pill--none";
    $("d-pill").textContent = "new";
    $("d-name").value = "";
    $("d-endpoint").value = "";
    $("d-model").value = "";
    $("d-key").placeholder = "Paste your API key…";
    $("d-keyhint").textContent = "";
    setSeg("key");
    setSubState(false, "");
    return;
  }
  $("d-chip").textContent = p.initial;
  $("d-title").textContent = p.name;
  const ready = p.auth !== "none";
  $("d-pill").className = "drawer__pill " + (ready ? "drawer__pill--ready" : "drawer__pill--none");
  $("d-pill").textContent = ready ? "ready" : "not configured";
  $("d-endpoint").value = p.endpoint;
  $("d-model").value = p.model;
  $("d-key").placeholder = p.keyTail ? "••••••••••••  (stored)" : "Paste your API key…";
  $("d-keyhint").textContent = p.keyTail ? `Key set — ends in ${p.keyTail} · paste to replace` : "No key configured";
  $("d-keyhint").className = "field__hint" + (p.keyTail ? " field__hint--ok" : "");
  setSeg(p.auth === "sub" ? "sub" : "key");
  setSubState(p.auth === "sub", p.account || "");
  $("d-rmlabel").textContent = `Remove ${p.name}?`;
}
function setSubState(connected, account) {
  $("sub-off").style.display = connected ? "none" : "";
  $("sub-on").style.display = connected ? "" : "none";
  $("d-account").textContent = account;
}
function openDrawer(id) {
  openId = id;
  fillDrawer(id === "__add__" ? null : providers.find(p => p.id === id));
  $("drawer").classList.add("is-open");
  $("dim").classList.add("is-on");
  renderTable();
}
function closeDrawer() {
  openId = null;
  $("drawer").classList.remove("is-open");
  $("dim").classList.remove("is-on");
  renderTable();
}
const current = () => providers.find(p => p.id === openId);

// ---------------------------------------------------------------------------
// interactions
// ---------------------------------------------------------------------------
$("btn-add").addEventListener("click", () => openDrawer("__add__"));
$("d-close").addEventListener("click", closeDrawer);
$("dim").addEventListener("click", closeDrawer);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

$("seg-key").addEventListener("click", () => setSeg("key"));
$("seg-sub").addEventListener("click", () => setSeg("sub"));

function syncEye() {
  $("d-key").type = showKey ? "text" : "password";
  $("eye-open").style.display = showKey ? "none" : "";
  $("eye-off").style.display = showKey ? "" : "none";
}
$("d-eye").addEventListener("click", () => { showKey = !showKey; syncEye(); });

// live edit — endpoint / model changes reflect in the table immediately
$("d-endpoint").addEventListener("input", e => { const p = current(); if (p) { p.endpoint = e.target.value; renderTable(); } });
$("d-model").addEventListener("input", e => { const p = current(); if (p) { p.model = e.target.value; renderTable(); } });

// fake test & save (key auth)
const SPINNER = '<svg class="spin" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 2a6 6 0 1 0 6 6" stroke-opacity="0.35"/><path d="M8 2a6 6 0 0 1 6 6" stroke-dasharray="9 28"/></svg>';
$("d-save").addEventListener("click", () => {
  const p = current();
  if (!p || !$("d-key").value.trim()) return;
  const btn = $("d-save");
  btn.disabled = true;
  btn.innerHTML = SPINNER + " Testing…";
  setTimeout(() => {
    btn.innerHTML = SPINNER + " Saving…";
    setTimeout(() => {
      p.auth = "key";
      p.keyTail = $("d-key").value.trim().slice(-4);
      delete p.account;
      btn.disabled = false;
      btn.textContent = "Test & Save";
      fillDrawer(p);
      renderTable();
    }, 450);
  }, 650);
});

// fake subscription connect / disconnect
$("d-login").addEventListener("click", () => {
  const btn = $("d-login");
  btn.innerHTML = SPINNER + " Connecting…";
  setTimeout(() => {
    btn.innerHTML = "Login with Subscription";
    const p = current();
    const account = "ibrahimalbayrak812@gmail.com";
    if (p) { p.auth = "sub"; p.account = account; fillDrawer(p); renderTable(); }
    else setSubState(true, account); // add-mode
  }, 900);
});
$("d-disconnect").addEventListener("click", () => {
  const p = current();
  if (!p) { setSubState(false, ""); return; }
  p.auth = p.keyTail ? "key" : "none";
  delete p.account;
  fillDrawer(p);
  renderTable();
});

// remove — low prominence, inline confirm
$("d-remove").addEventListener("click", () => {
  $("d-remove").style.display = "none";
  $("d-rmconfirm").classList.add("is-on");
});
$("d-rmno").addEventListener("click", () => {
  $("d-rmconfirm").classList.remove("is-on");
  $("d-remove").style.display = "";
});
$("d-rmyes").addEventListener("click", () => {
  const row = document.querySelector(`.ptable__row[data-id="${openId}"]`);
  const idx = providers.findIndex(p => p.id === openId);
  if (row) row.classList.add("is-leaving");
  closeDrawer();
  setTimeout(() => { if (idx >= 0) providers.splice(idx, 1); renderTable(); }, 190);
});

// add flow — appends a row (auth: key if a key was pasted, sub if connected, else none)
$("d-addbtn").addEventListener("click", () => {
  const name = $("d-name").value.trim() || "Custom provider";
  const key = $("d-key").value.trim();
  const connected = $("sub-on").style.display !== "none";
  providers.push({
    id: "custom-" + (providers.length + 1),
    initial: name[0].toUpperCase(),
    name,
    model: $("d-model").value.trim() || "model-id",
    endpoint: $("d-endpoint").value.trim() || "api.example.com",
    auth: connected ? "sub" : key ? "key" : "none",
    ...(key ? { keyTail: key.slice(-4) } : {}),
    ...(connected ? { account: "ibrahimalbayrak812@gmail.com" } : {}),
  });
  closeDrawer();
});

renderTable();
</script>
</body>
</html>
