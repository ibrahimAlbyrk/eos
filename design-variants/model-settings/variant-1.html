<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eos · Settings · Model — Variant 1 (Dense Utility List)</title>
<style>
/* ============================================================
   Eos design tokens — copied from app/ui/src/styles.css :root.
   Webfont names resolve to system fallbacks; zero network.
   ============================================================ */
:root {
  color-scheme: dark;
  --font-ui: "Plus Jakarta Sans Variable", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: "JetBrains Mono Variable", ui-monospace, SFMono-Regular, monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-xl: 1.0625rem;
  --bg: #1a1a1a;
  --surface: #1f1f1f;
  --border: #262626;
  --fg: #ebebeb;
  --fg-mid: #c4c4c4;
  --fg-dim: #8a8a8a;
  --fg-faint: #5a5a5a;
  --accent: #6ea4e8;
  --accent-soft: color-mix(in srgb, var(--accent) 13%, transparent);
  --accent-hover: #8ab9f0;
  --on-accent: #0a0a0a;
  --ok: #67c084;
  --warn: #d4a55a;
  --err: #d97670;
  --violet: #c8a2ff;
  --tint: 255, 255, 255;
  --glass: 30, 30, 30;
  --rim: 255, 255, 255;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input { font: inherit; color: inherit; background: none; border: none; outline: none; }

html { font-size: 16px; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Faux dashboard behind the settings overlay, so the glass reads correctly */
.backdrop {
  position: fixed; inset: 0;
  background:
    radial-gradient(1100px 500px at 70% -10%, rgba(110, 164, 232, 0.05), transparent 60%),
    radial-gradient(800px 600px at 10% 110%, rgba(200, 162, 255, 0.04), transparent 55%),
    var(--bg);
}
.backdrop::after {
  content: "";
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(var(--tint), 0.015) 1px, transparent 1px);
  background-size: 100% 34px;
}

/* ============================================================
   Settings overlay + modal — mirrors .stg-overlay / .stg-modal
   ============================================================ */
.stg-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.stg-modal {
  width: min(780px, calc(100vw - 48px));
  height: min(620px, calc(100vh - 64px));
  display: flex;
  overflow: hidden;
  border-radius: 14px;
  background: rgba(var(--glass), 0.88);
  backdrop-filter: blur(40px) saturate(170%);
  -webkit-backdrop-filter: blur(40px) saturate(170%);
  box-shadow:
    inset 0 1px 0 rgba(var(--rim), 0.07),
    inset 0 0 0 1px rgba(var(--tint), 0.05),
    0 24px 70px rgba(0, 0, 0, 0.55);
  animation: pop 140ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
@keyframes pop { from { opacity: 0; transform: scale(0.98); } }

.stg-nav {
  width: 188px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 2px;
  padding: 12px 10px;
  border-right: 1px solid rgba(var(--tint), 0.07);
}
.stg-search {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 9px; margin-bottom: 10px;
  border-radius: 7px;
  background: rgba(var(--tint), 0.05);
  color: var(--fg-faint);
  font-size: var(--text-sm);
}
.stg-nav__item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 7px;
  font-size: var(--text-base); color: var(--fg-dim);
  text-align: left;
  transition: background 120ms ease, color 120ms ease;
}
.stg-nav__item:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }
.stg-nav__item.is-active { background: rgba(var(--tint), 0.08); color: var(--fg); }
.stg-nav__item svg { flex-shrink: 0; color: var(--fg-faint); }
.stg-nav__item.is-active svg { color: var(--accent); }

.stg-body {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
.stg-scroll { flex: 1; overflow-y: auto; padding: 22px 26px 14px; }
.stg-scroll::-webkit-scrollbar { width: 8px; }
.stg-scroll::-webkit-scrollbar-thumb { background: rgba(var(--tint), 0.09); border-radius: 4px; }

/* ============================================================
   Section header: title + live meta + filter
   ============================================================ */
.hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
.hdr h2 {
  font-size: var(--text-xl); font-weight: 600;
  letter-spacing: -0.01em; color: var(--fg);
}
.hdr__meta {
  font-family: var(--font-mono); font-size: var(--text-xs);
  color: var(--fg-faint);
}
.hdr__filter {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: 7px;
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  transition: background 120ms ease, box-shadow 120ms ease;
}
.hdr__filter:focus-within {
  background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent);
}
.hdr__filter svg { color: var(--fg-faint); flex-shrink: 0; }
.hdr__filter input { width: 110px; font-size: var(--text-sm); color: var(--fg); }
.hdr__filter input::placeholder { color: var(--fg-faint); }
.hdr__filter kbd {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint);
  padding: 1px 5px; border-radius: 4px;
  background: rgba(var(--tint), 0.06);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07);
}
.hdr__sub { font-size: var(--text-sm); color: var(--fg-faint); margin-bottom: 14px; }

/* ============================================================
   Dense provider list — single-line rows, accordion editor
   ============================================================ */
.plist {
  border-radius: 10px;
  background: rgba(var(--tint), 0.02);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.06);
  overflow: hidden;
}
.prow { border-top: 1px solid rgba(var(--tint), 0.045); }
.prow:first-child { border-top: none; }
.prow.is-hidden { display: none; }

.prow__head {
  display: flex; align-items: center; gap: 10px;
  width: 100%; height: 34px;
  padding: 0 10px 0 12px;
  text-align: left;
  transition: background 100ms ease;
  outline: none;
}
.prow__head:hover { background: rgba(var(--tint), 0.04); }
.prow__head:focus-visible { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent); }
.prow.is-open .prow__head { background: rgba(var(--tint), 0.045); }

.dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  transition: background 160ms ease, box-shadow 160ms ease;
}
.dot--on  { background: var(--ok); box-shadow: 0 0 6px color-mix(in srgb, var(--ok) 55%, transparent); }
.dot--off { background: transparent; box-shadow: inset 0 0 0 1.5px rgba(var(--tint), 0.22); }

.prow__name {
  font-size: var(--text-sm); font-weight: 500; color: var(--fg);
  width: 132px; flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prow__conn {
  flex: 1; min-width: 0;
  font-family: var(--font-mono); font-size: var(--text-xs);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--fg-dim);
}
.prow__conn .host { color: var(--fg-faint); }
.prow__conn .sep { color: var(--fg-faint); opacity: 0.6; margin: 0 4px; }

.badge {
  flex-shrink: 0;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px; border-radius: 5px;
  transition: background 160ms ease, color 160ms ease;
}
.badge--key { color: var(--fg-mid); background: rgba(var(--tint), 0.07); box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.06); }
.badge--sub { color: var(--accent); background: var(--accent-soft); }
.badge--off { color: var(--fg-faint); box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.10); }

.prow__chev { color: var(--fg-faint); flex-shrink: 0; transition: transform 160ms ease, color 120ms ease; }
.prow__head:hover .prow__chev { color: var(--fg-dim); }
.prow.is-open .prow__chev { transform: rotate(180deg); color: var(--fg-dim); }

/* Accordion editor — grid-rows trick for smooth height animation */
.prow__editor {
  display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows 190ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
.prow.is-open .prow__editor { grid-template-rows: 1fr; }
.prow__editor > .ed { overflow: hidden; min-height: 0; }
.ed__inner {
  padding: 4px 14px 14px 29px;
  display: flex; flex-direction: column; gap: 12px;
}

.ed__label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-mono); color: var(--fg-faint);
  margin-bottom: 6px;
}

/* auth method segmented switch — .stg-seg idiom */
.seg {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px; border-radius: 8px;
  background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07);
  align-self: flex-start;
}
.seg__btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: 6px;
  font-size: var(--text-xs); color: var(--fg-dim);
  transition: background 120ms ease, color 120ms ease, box-shadow 120ms ease;
}
.seg__btn:hover { color: var(--fg); }
.seg__btn.is-active {
  color: var(--fg);
  background: rgba(var(--tint), 0.10);
  box-shadow: inset 0 1px 0 rgba(var(--rim), 0.20), inset 0 0 0 1px rgba(var(--tint), 0.06), 0 1px 3px rgba(0, 0, 0, 0.25);
}

/* inputs — .stg-input idiom */
.inp {
  display: flex; align-items: center; gap: 6px;
  padding: 0 5px 0 10px;
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  border-radius: 8px;
  transition: background 120ms ease, box-shadow 120ms ease;
}
.inp:hover { background: rgba(var(--tint), 0.07); }
.inp:focus-within {
  background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent);
}
.inp input {
  flex: 1; min-width: 0; padding: 6px 0;
  font-size: var(--text-xs); font-family: var(--font-mono); color: var(--fg);
}
.inp input::placeholder { color: var(--fg-faint); }
.inp__eye {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 6px; color: var(--fg-dim);
  transition: background 120ms ease, color 120ms ease;
}
.inp__eye:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }

.ed__keyrow { display: flex; gap: 8px; }
.ed__keyrow .inp { flex: 1; }

.btn-accent {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 8px; flex-shrink: 0;
  font-size: var(--text-xs); font-weight: 600;
  color: var(--on-accent); background: var(--accent);
  transition: background 120ms ease, opacity 120ms ease;
}
.btn-accent:hover:not(:disabled) { background: var(--accent-hover); }
.btn-accent:disabled { opacity: 0.45; cursor: default; }

.btn-quiet {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 7px;
  font-size: var(--text-xs); color: var(--fg-dim);
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  transition: background 120ms ease, color 120ms ease;
}
.btn-quiet:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }

/* subscription pane */
.sub-cta {
  display: inline-flex; align-items: center; gap: 7px;
  align-self: flex-start;
  padding: 6px 14px; border-radius: 8px;
  font-size: var(--text-xs); font-weight: 600; color: var(--accent);
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent);
  transition: background 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
}
.sub-cta:hover:not(:disabled) { background: color-mix(in srgb, var(--accent) 20%, transparent); }
.sub-cta:disabled { opacity: 0.6; cursor: default; }
.sub-connected {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--text-xs);
}
.sub-connected .who { color: var(--fg-mid); font-family: var(--font-mono); }
.sub-connected .plan { color: var(--fg-faint); font-family: var(--font-mono); }
.sub-connected svg { color: var(--ok); flex-shrink: 0; }
.sub-connected .disc {
  margin-left: 6px; padding: 3px 9px; border-radius: 6px;
  font-size: 10px; color: var(--fg-faint);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.09);
  transition: color 120ms ease, background 120ms ease, box-shadow 120ms ease;
}
.sub-connected .disc:hover { color: var(--err); background: rgba(217, 118, 112, 0.10); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--err) 35%, transparent); }
.sub-note { font-size: var(--text-xs); color: var(--fg-faint); }

.ed__ok {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: var(--text-xs); color: var(--ok);
  animation: fadein 200ms ease;
}
@keyframes fadein { from { opacity: 0; transform: translateY(2px); } }

.ed__foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 2px;
}
.rm {
  font-size: var(--text-xs); color: var(--fg-faint);
  padding: 3px 8px; border-radius: 6px;
  transition: color 120ms ease, background 120ms ease;
}
.rm:hover { color: var(--err); background: rgba(217, 118, 112, 0.10); }
.rm.is-armed { color: var(--err); background: rgba(217, 118, 112, 0.12); }

/* add-provider row */
.addrow { border-top: 1px solid rgba(var(--tint), 0.045); }
.addrow__btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%; height: 34px; padding: 0 12px;
  font-size: var(--text-sm); color: var(--fg-faint);
  transition: background 100ms ease, color 120ms ease;
  outline: none;
}
.addrow__btn:hover, .addrow__btn:focus-visible { background: rgba(var(--tint), 0.04); color: var(--fg-dim); }
.addrow__btn:focus-visible { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent); }
.addrow__menu {
  display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows 190ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
.addrow.is-open .addrow__menu { grid-template-rows: 1fr; }
.addrow__menu > div { overflow: hidden; min-height: 0; }
.addrow__opts { padding: 2px 10px 12px 29px; display: flex; flex-wrap: wrap; gap: 6px; }
.addopt {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 11px; border-radius: 7px;
  font-size: var(--text-xs); color: var(--fg-dim);
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  transition: background 120ms ease, color 120ms ease;
}
.addopt:hover { background: rgba(var(--tint), 0.09); color: var(--fg); }
.addopt .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }

.empty { padding: 26px 0; text-align: center; font-size: var(--text-sm); color: var(--fg-faint); }

/* footer hint bar — keyboard affordance, Raycast-style */
.hints {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 9px 26px;
  border-top: 1px solid rgba(var(--tint), 0.06);
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint);
}
.hints kbd {
  padding: 1px 5px; border-radius: 4px; margin-right: 4px;
  background: rgba(var(--tint), 0.06);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  font-family: inherit;
}

/* variant badge */
.vbadge {
  position: fixed; right: 14px; bottom: 12px; z-index: 999;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em;
  color: var(--fg-dim);
  padding: 5px 10px; border-radius: 7px;
  background: rgba(var(--glass), 0.9);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.1), 0 4px 14px rgba(0,0,0,0.4);
}
.vbadge b { color: var(--accent); font-weight: 600; }

.spin { animation: spin 0.7s linear infinite; transform-origin: center; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="stg-overlay">

    <nav class="stg-nav">

  { id: "kimi",      name: "Moonshot Kimi",    host: "api.moonshot.ai",                    model: "kimi-k2.6",              auth: "none", account: "", plan: "", keyMask: "" },
  { id: "glm",       name: "Zhipu GLM",        host: "api.z.ai",                           model: "glm-5.2",                auth: "sub",  account: "ibrahim@z.ai", plan: "Coding Pro", keyMask: "" },
  { id: "grok",      name: "xAI Grok",         host: "api.x.ai",                           model: "grok-4.2",               auth: "none", account: "", plan: "", keyMask: "" },
];

const ADD_PRESETS = [
  { id: "mistral",    name: "Mistral",         host: "api.mistral.ai",   model: "mistral-large-3" },
  { id: "openrouter", name: "OpenRouter",      host: "openrouter.ai",    model: "auto" },
  { id: "groq",       name: "Groq",            host: "api.groq.com",     model: "llama-4.1-405b" },
];

let expandedId = null;              // provider id whose editor is open
const editorTab = {};               // per-provider: which auth pane is shown ("key" | "sub")
let filterText = "";

const $list = document.getElementById("plist");
const $meta = document.getElementById("meta");
const $filter = document.getElementById("filter");

/* ----------------------------------------------------------------
   Icons
   ---------------------------------------------------------------- */
const svg = {
  chev: '<svg class="prow__chev" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>',
  eye: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
  eyeOff: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M4 4l16 16"/></svg>',
  check: '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 5"/></svg>',
  plus: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>',
  spin: '<svg class="spin" width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 2a6 6 0 1 0 6 6" stroke-opacity="0.35"/><path d="M8 2a6 6 0 0 1 6 6" stroke-dasharray="9 28"/></svg>',
  ext: '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5H3.5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V9.5M9.5 2.5h4v4M13 3L7.5 8.5"/></svg>',
};

const esc = (s) => s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

/* ----------------------------------------------------------------
   Render
   ---------------------------------------------------------------- */
function badgeFor(p) {
  if (p.auth === "key") return '<span class="badge badge--key">key</span>';
  if (p.auth === "sub") return '<span class="badge badge--sub">sub</span>';
  return '<span class="badge badge--off">not set</span>';
}

function editorHtml(p) {
  const tab = editorTab[p.id] || (p.auth === "sub" ? "sub" : "key");
  const keyPane = tab === "key";

  let authPane;
  if (keyPane) {
    const placeholder = p.auth === "key" && p.keyMask
      ? "Current: " + esc(p.keyMask) + " — paste to replace"
      : "Paste your API key…";
    authPane =
      '<div class="ed__keyrow">' +
        '<div class="inp"><input type="password" data-keyinput spellcheck="false" autocomplete="new-password" placeholder="' + placeholder + '">' +
        '<button class="inp__eye" data-act="eye" title="Show">' + svg.eye + '</button></div>' +
        '<button class="btn-accent" data-act="savekey" disabled>Save key</button>' +
      '</div>' +
      '<div data-keymsg></div>';
  } else if (p.auth === "sub") {
    authPane =
      '<div class="sub-connected">' + svg.check +
        '<span class="who">' + esc(p.account) + '</span>' +
        '<span class="plan">· ' + esc(p.plan) + '</span>' +
        '<button class="disc" data-act="disconnect">Disconnect</button>' +
      '</div>';
  } else {
    authPane =
      '<button class="sub-cta" data-act="connect">' + svg.ext + ' Login with Subscription</button>' +
      '<div class="sub-note">Opens the provider’s sign-in page. Usage bills to your plan, not per token.</div>';
  }

  return (
    '<div class="ed"><div class="ed__inner">' +
      '<div>' +
        '<div class="ed__label">Authentication</div>' +
        '<div class="seg" role="tablist">' +
          '<button class="seg__btn' + (keyPane ? " is-active" : "") + '" data-act="tab-key">API key</button>' +
          '<button class="seg__btn' + (!keyPane ? " is-active" : "") + '" data-act="tab-sub">Subscription</button>' +
        '</div>' +
      '</div>' +
      authPane +
      '<div class="ed__foot">' +
        '<button class="rm" data-act="remove">Remove provider</button>' +
        '<button class="btn-quiet" data-act="done">Done</button>' +
      '</div>' +
    '</div></div>'
  );
}

function rowHtml(p) {
  const open = expandedId === p.id;
  const hidden = filterText && !(p.name + " " + p.host + " " + p.model).toLowerCase().includes(filterText);
  return (
    '<div class="prow' + (open ? " is-open" : "") + (hidden ? " is-hidden" : "") + '" data-id="' + p.id + '">' +
      '<button class="prow__head" data-act="toggle" aria-expanded="' + open + '">' +
        '<span class="dot ' + (p.auth === "none" ? "dot--off" : "dot--on") + '"></span>' +
        '<span class="prow__name">' + esc(p.name) + '</span>' +
        '<span class="prow__conn"><span class="host">' + esc(p.host || "—") + '</span><span class="sep">·</span>' + esc(p.model || "—") + '</span>' +
        badgeFor(p) + svg.chev +
      '</button>' +
      '<div class="prow__editor">' + (open ? editorHtml(p) : '<div class="ed"></div>') + '</div>' +
    '</div>'
  );
}

function render() {
  const rows = providers.map(rowHtml).join("");
  const visible = providers.filter((p) => !filterText || (p.name + " " + p.host + " " + p.model).toLowerCase().includes(filterText));
  const emptyNote = visible.length === 0 ? '<div class="empty">No providers match “' + esc(filterText) + '”</div>' : "";

  $list.innerHTML =
    rows + emptyNote +
    '<div class="addrow" id="addrow">' +
      '<button class="addrow__btn" data-act="add-toggle">' + svg.plus + ' Add provider</button>' +
      '<div class="addrow__menu"><div><div class="addrow__opts">' +
        ADD_PRESETS.map((a) =>
          '<button class="addopt" data-add="' + a.id + '">' + esc(a.name) +
          ' <span class="m">' + esc(a.model) + "</span></button>"
        ).join("") +
      "</div></div></div>" +
    "</div>";

  const authed = providers.filter((p) => p.auth !== "none").length;
  $meta.textContent = providers.length + " providers · " + authed + " authenticated";
}

/* Re-render, then animate the newly opened editor from collapsed state. */
function renderAnimated(openId) {
  expandedId = openId;
  render();
  if (!openId) return;
  const row = $list.querySelector('.prow[data-id="' + openId + '"]');
  if (!row) return;
  row.classList.remove("is-open");
  void row.offsetHeight;
  row.classList.add("is-open");
  const firstInput = row.querySelector("[data-keyinput]");
  if (firstInput && document.activeElement !== $filter) setTimeout(() => firstInput.focus({ preventScroll: false }), 200);
}

/* ----------------------------------------------------------------
   Interactions (event delegation on the list)
   ---------------------------------------------------------------- */
$list.addEventListener("click", (e) => {
  const addBtn = e.target.closest("[data-add]");
  if (addBtn) { addProvider(addBtn.dataset.add); return; }

  const actBtn = e.target.closest("[data-act]");
  if (!actBtn) return;
  const act = actBtn.dataset.act;

  if (act === "add-toggle") {
    document.getElementById("addrow").classList.toggle("is-open");
    return;
  }

  const row = actBtn.closest(".prow");
  const p = row && providers.find((x) => x.id === row.dataset.id);
  if (!p) return;

  switch (act) {
    case "toggle":
      renderAnimated(expandedId === p.id ? null : p.id);
      break;
    case "done":
      renderAnimated(null);
      break;
    case "tab-key": editorTab[p.id] = "key"; render(); break;
    case "tab-sub": editorTab[p.id] = "sub"; render(); break;
    case "eye": {
      const input = row.querySelector("[data-keyinput]");
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      actBtn.innerHTML = show ? svg.eyeOff : svg.eye;
      actBtn.title = show ? "Hide" : "Show";
      input.focus();
      break;
    }
    case "savekey": saveKey(row, p, actBtn); break;
    case "connect": connectSub(row, p, actBtn); break;
    case "disconnect":
      p.auth = "none"; p.account = ""; p.plan = "";
      editorTab[p.id] = "sub";
      render();
      break;
    case "remove":
      if (actBtn.classList.contains("is-armed")) {
        providers = providers.filter((x) => x.id !== p.id);
        renderAnimated(null);
      } else {
        actBtn.classList.add("is-armed");
        actBtn.textContent = "Sure? Click to remove";
        setTimeout(() => {
          if (actBtn.isConnected) { actBtn.classList.remove("is-armed"); actBtn.textContent = "Remove provider"; }
        }, 2600);
      }
      break;
  }
});

$list.addEventListener("input", (e) => {
  if (e.target.matches("[data-keyinput]")) {
    const row = e.target.closest(".prow");
    const save = row.querySelector('[data-act="savekey"]');
    if (save) save.disabled = e.target.value.trim().length === 0;
  }
});

$list.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.target.matches("[data-keyinput]")) {
    const row = e.target.closest(".prow");
    const p = providers.find((x) => x.id === row.dataset.id);
    const save = row.querySelector('[data-act="savekey"]');
    if (p && save && !save.disabled) saveKey(row, p, save);
  }
});

function saveKey(row, p, btn) {
  const input = row.querySelector("[data-keyinput]");
  const val = input.value.trim();
  if (!val) return;
  btn.disabled = true;
  btn.innerHTML = svg.spin + " Testing…";
  setTimeout(() => {
    p.auth = "key";
    p.keyMask = val.slice(0, Math.min(6, val.length)) + "…-" + Math.random().toString(16).slice(2, 6);
    editorTab[p.id] = "key";
    render();
    const msg = $list.querySelector('.prow[data-id="' + p.id + '"] [data-keymsg]');
    if (msg) msg.innerHTML = '<div class="ed__ok">' + svg.check + " Key verified &amp; saved</div>";
  }, 750);
}

function connectSub(row, p, btn) {
  btn.disabled = true;
  btn.innerHTML = svg.spin + " Opening browser…";
  setTimeout(() => { if (btn.isConnected) btn.innerHTML = svg.spin + " Waiting for sign-in…"; }, 700);
  setTimeout(() => {
    p.auth = "sub";
    p.account = "ibrahimalbayrak812@gmail.com";
    p.plan = p.id === "anthropic" ? "Max 20×" : "Pro";
    editorTab[p.id] = "sub";
    render();
  }, 1600);
}

function addProvider(presetId) {
  const preset = ADD_PRESETS.find((a) => a.id === presetId);
  if (!preset) return;
  let id = preset.id, n = 2;
  while (providers.some((p) => p.id === id)) id = preset.id + "-" + n++;
  providers.push({
    id, name: preset.name, host: preset.host, model: preset.model,
    auth: "none", account: "", plan: "", keyMask: "",
  });
  filterText = ""; $filter.value = "";
  renderAnimated(id);
  const row = $list.querySelector('.prow[data-id="' + id + '"]');
  if (row) row.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

/* ----------------------------------------------------------------
   Filter + keyboard navigation
   ---------------------------------------------------------------- */
$filter.addEventListener("input", () => {
  filterText = $filter.value.trim().toLowerCase();
  render();
});
$filter.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { $filter.value = ""; filterText = ""; render(); $filter.blur(); }
  if (e.key === "ArrowDown") { e.preventDefault(); focusRow(0); }
});

function visibleHeads() {
  return [...$list.querySelectorAll(".prow:not(.is-hidden) .prow__head, .addrow__btn")];
}
function focusRow(idx) {
  const heads = visibleHeads();
  if (heads.length === 0) return;
  heads[Math.max(0, Math.min(idx, heads.length - 1))].focus();
}

document.addEventListener("keydown", (e) => {
  const inField = /^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName || "");

  if (e.key === "/" && !inField) { e.preventDefault(); $filter.focus(); $filter.select(); return; }
  if (inField && document.activeElement !== $filter) {
    if (e.key === "Escape") { renderAnimated(null); focusRow(0); }
    return;
  }
  if (document.activeElement === $filter) return;

  const heads = visibleHeads();
  const cur = heads.indexOf(document.activeElement);

  if (e.key === "ArrowDown" || (e.key === "j" && !inField)) { e.preventDefault(); focusRow(cur + 1); }
  else if (e.key === "ArrowUp" || (e.key === "k" && !inField)) { e.preventDefault(); focusRow(cur <= 0 ? 0 : cur - 1); }
  else if (e.key === "Escape" && expandedId) {
    const openIdx = heads.findIndex((h) => h.closest(".prow")?.dataset.id === expandedId);
    renderAnimated(null);
    focusRow(openIdx >= 0 ? openIdx : 0);
  }
});

render();
</script>
</body>
</html>
