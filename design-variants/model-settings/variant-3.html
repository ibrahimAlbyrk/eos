<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eos · Settings — Model · Variant 3 (Master-Detail)</title>
<style>
/* ==========================================================================
   Eos design tokens (mirrored from app/ui/src/styles.css)
   ========================================================================== */
:root {
  color-scheme: dark;
  --font-ui: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-xl: 1.0625rem;
  --bg: #1a1a1a;
  --surface: #1f1f1f;
  --surface-2: #252525;
  --border: #262626;
  --fg: #ebebeb;
  --fg-mid: #c4c4c4;
  --fg-dim: #8a8a8a;
  --fg-faint: #5a5a5a;
  --accent: #6ea4e8;
  --accent-hover: #8ab9f0;
  --on-accent: #0a0a0a;
  --ok: #67c084;
  --warn: #d4a55a;
  --err: #d97670;
  --violet: #c8a2ff;
  --amber: #e8a838;
  --tint: 255, 255, 255;
  --glass: 30, 30, 30;
  --rim: 255, 255, 255;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-ui);
  font-size: var(--text-base);
  line-height: 1.55;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; background: none; border: 0; color: inherit; padding: 0; }
input { font-family: inherit; color: inherit; background: none; border: 0; outline: none; }
input::placeholder { color: var(--fg-faint); }

/* faint dashboard glow behind the modal so the glass has something to blur */
.backdrop {
  position: fixed; inset: 0;
  background:
    radial-gradient(600px 400px at 18% 12%, rgba(110, 164, 232, 0.05), transparent 70%),
    radial-gradient(700px 500px at 85% 90%, rgba(200, 162, 255, 0.04), transparent 70%),
    var(--bg);
}
.overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0, 0, 0, 0.45);
}

/* ==========================================================================
   settings modal shell (matches .stg-modal)
   ========================================================================== */
.modal {
  width: min(940px, calc(100vw - 48px));
  height: min(600px, calc(100vh - 64px));
  display: flex;
  overflow: hidden;
  border-radius: 12px;
  background: rgba(var(--glass), 0.88);
  backdrop-filter: blur(40px) saturate(170%);
  -webkit-backdrop-filter: blur(40px) saturate(170%);
  box-shadow:
    inset 0 1px 0 rgba(var(--rim), 0.07),
    inset 0 0 0 1px rgba(var(--tint), 0.05),
    0 24px 70px rgba(0, 0, 0, 0.5);
  animation: pop 160ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
@keyframes pop { from { opacity: 0; transform: scale(0.985) translateY(4px); } }

/* settings nav (context only) */
.nav {
  width: 168px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 2px;
  padding: 12px 10px;
  border-right: 1px solid rgba(var(--tint), 0.07);
}
.nav__search {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 9px; margin-bottom: 10px;
  border-radius: 7px;
  background: rgba(var(--tint), 0.05);
  color: var(--fg-faint);
  font-size: var(--text-sm);
}
.nav__item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 7px;
  font-size: var(--text-base); color: var(--fg-dim);
  text-align: left; width: 100%;
  transition: background 120ms ease, color 120ms ease;
}
.nav__item svg { flex-shrink: 0; opacity: 0.8; }
.nav__item:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }
.nav__item.is-active { background: rgba(var(--tint), 0.08); color: var(--fg); }

/* ==========================================================================
   Model section body — master-detail split
   ========================================================================== */
.body {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  padding: 22px 26px 18px;
}
.title { margin: 0 0 4px; font-size: var(--text-xl); font-weight: 600; letter-spacing: -0.01em; }
.subtitle { margin: 0 0 16px; font-size: var(--text-sm); color: var(--fg-faint); }

.split { flex: 1; min-height: 0; display: flex; gap: 0; }

/* ---------------- provider rail ---------------- */
.rail {
  width: 212px; flex-shrink: 0;
  display: flex; flex-direction: column;
  padding-right: 14px;
  border-right: 1px solid rgba(var(--tint), 0.07);
}
.rail__list { display: flex; flex-direction: column; gap: 1px; }
.prow {
  display: grid;
  grid-template-columns: 14px 1fr;
  column-gap: 8px; align-items: center;
  width: 100%; text-align: left;
  padding: 5px 8px; border-radius: 7px;
  transition: background 120ms ease;
}
.prow:hover { background: rgba(var(--tint), 0.05); }
.prow.is-active {
  background: rgba(var(--tint), 0.08);
  box-shadow: inset 0 1px 0 rgba(var(--rim), 0.09), inset 0 0 0 1px rgba(var(--tint), 0.05);
}
.prow__dot {
  width: 7px; height: 7px; border-radius: 50%;
  justify-self: center;
  background: var(--fg-faint);
}
.prow__dot.st-none { background: transparent; box-shadow: inset 0 0 0 1.5px var(--fg-faint); }
.prow__dot.st-key { background: var(--ok); box-shadow: 0 0 6px color-mix(in srgb, var(--ok) 45%, transparent); }
.prow__dot.st-sub { background: var(--accent); box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 45%, transparent); }
.prow__name {
  font-size: var(--text-sm); font-weight: 500; color: var(--fg-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.35;
}
.prow.is-active .prow__name { color: var(--fg); }
.prow__model {
  grid-column: 2;
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--fg-faint); line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prow.st-none .prow__name { color: var(--fg-dim); }

.rail__add {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 6px 8px;
  border-radius: 7px;
  font-size: var(--text-sm); color: var(--fg-dim);
  transition: background 120ms ease, color 120ms ease;
}
.rail__add:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }
.rail__add.is-active { background: rgba(var(--tint), 0.08); color: var(--fg); }
.rail__add svg { flex-shrink: 0; }

.rail__legend {
  margin-top: auto; padding: 8px 8px 0;
  display: flex; gap: 10px;
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--fg-faint);
}
.rail__legend span { display: inline-flex; align-items: center; gap: 4px; }
.rail__legend i { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.rail__legend .lg-key i { background: var(--ok); }
.rail__legend .lg-sub i { background: var(--accent); }
.rail__legend .lg-none i { background: transparent; box-shadow: inset 0 0 0 1.2px var(--fg-faint); }

/* ---------------- detail pane ---------------- */
.detail { flex: 1; min-width: 0; padding: 2px 4px 0 20px; overflow-y: auto; }
.detail::-webkit-scrollbar { width: 8px; }
.detail::-webkit-scrollbar-thumb { background: rgba(var(--tint), 0.12); border-radius: 99px; }

.dhead { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.dhead__glyph {
  width: 34px; height: 34px; flex-shrink: 0;
  border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9375rem;
  box-shadow: inset 0 1px 0 rgba(var(--rim), 0.1), inset 0 0 0 1px rgba(var(--tint), 0.06);
}
.dhead__name { font-size: 0.9375rem; font-weight: 600; }
.dhead__host { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--fg-faint); margin-top: 1px; }
.dpill {
  margin-left: auto; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 99px;
  font-family: var(--font-mono); font-size: 0.65rem;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.dpill i { width: 5px; height: 5px; border-radius: 50%; display: inline-block; background: currentColor; }
.dpill.st-none { color: var(--fg-dim); background: rgba(var(--tint), 0.06); }
.dpill.st-key { color: var(--ok); background: color-mix(in srgb, var(--ok) 11%, transparent); }
.dpill.st-sub { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }

.dsec { margin-top: 18px; }
.dsec__title {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-mono); color: var(--fg-faint);
  padding-bottom: 6px; margin-bottom: 12px;
  border-bottom: 1px solid rgba(var(--tint), 0.07);
}

/* segmented control (matches .stg-seg) */
.seg {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px; border-radius: 8px;
  background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07);
}
.seg__btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 4px 14px; height: 26px; border-radius: 6px;
  font-size: var(--text-sm); color: var(--fg-dim);
  transition: background 120ms ease, color 120ms ease, box-shadow 120ms ease;
}
.seg__btn:hover { color: var(--fg); }
.seg__btn.is-active {
  color: var(--fg);
  background: rgba(var(--tint), 0.10);
  box-shadow: inset 0 1px 0 rgba(var(--rim), 0.20), inset 0 0 0 1px rgba(var(--tint), 0.06), 0 1px 3px rgba(0, 0, 0, 0.25);
}
.seg__btn .seg__st { width: 5px; height: 5px; border-radius: 50%; }
.seg__btn .seg__st.on-key { background: var(--ok); }
.seg__btn .seg__st.on-sub { background: var(--accent); }

.authbox { margin-top: 12px; }

/* inputs (matches .stg-input) */
.inp {
  display: flex; align-items: center; gap: 6px;
  padding: 0 5px 0 12px;
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.08);
  border-radius: 8px;
  transition: background 120ms ease, box-shadow 120ms ease;
}
.inp:hover { background: rgba(var(--tint), 0.07); }
.inp:focus-within {
  background: rgba(var(--tint), 0.05);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent);
}
.inp input { flex: 1; min-width: 0; padding: 7px 0; font-size: var(--text-sm); font-family: var(--font-mono); }
.inp__eye {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px; color: var(--fg-dim); flex-shrink: 0;
  transition: background 120ms ease, color 120ms ease;
}
.inp__eye:hover { background: rgba(var(--tint), 0.08); color: var(--fg); }

/* the saved-key chip row */
.keyset {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  background: rgba(var(--tint), 0.04);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.07);
}
.keyset__mask { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--fg-mid); letter-spacing: 0.04em; }
.keyset__ok { display: inline-flex; align-items: center; gap: 5px; font-size: var(--text-xs); color: var(--ok); }
.keyset__replace {
  margin-left: auto; padding: 4px 10px; border-radius: 6px;
  font-size: var(--text-xs); color: var(--fg-dim);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.09);
  transition: background 120ms ease, color 120ms ease;
}
.keyset__replace:hover { background: rgba(var(--tint), 0.07); color: var(--fg); }

/* buttons */
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px;
  font-size: var(--text-sm); font-weight: 600;
  color: var(--on-accent); background: var(--accent);
  transition: background 120ms ease;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: default; }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 8px;
  font-size: var(--text-sm); color: var(--fg-mid);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.1);
  transition: background 120ms ease, color 120ms ease;
}
.btn-ghost:hover { background: rgba(var(--tint), 0.07); color: var(--fg); }
.hint { font-size: var(--text-xs); color: var(--fg-faint); margin-top: 8px; line-height: 1.5; }

/* subscription connected card */
.subcard {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: 9px;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent);
}
.subcard__avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 700;
  background: color-mix(in srgb, var(--accent) 22%, transparent);
  color: var(--accent);
}
.subcard__who { min-width: 0; }
.subcard__acct { font-size: var(--text-sm); color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.subcard__plan { font-family: var(--font-mono); font-size: 0.65rem; color: var(--fg-dim); margin-top: 1px; }
.subcard__disc {
  margin-left: auto; flex-shrink: 0;
  padding: 4px 11px; border-radius: 6px;
  font-size: var(--text-xs); color: var(--fg-dim);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.1);
  transition: background 120ms ease, color 120ms ease;
}
.subcard__disc:hover { background: rgba(var(--err), 0.14); color: var(--err); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--err) 30%, transparent); }

/* endpoint / model field grid */
.fields { display: grid; grid-template-columns: 108px 1fr; row-gap: 10px; column-gap: 14px; align-items: center; }
.fields label { font-size: var(--text-sm); color: var(--fg-dim); }

/* footer: low-prominence remove */
.dfoot {
  margin-top: 22px; padding-top: 12px;
  border-top: 1px solid rgba(var(--tint), 0.05);
  display: flex; align-items: center; gap: 10px;
}
.rm {
  font-size: var(--text-xs); color: var(--fg-faint);
  padding: 4px 8px; border-radius: 6px;
  transition: background 120ms ease, color 120ms ease;
}
.rm:hover { background: rgba(var(--err), 0.12); color: var(--err); }
.rm-confirm { font-size: var(--text-xs); color: var(--err); }
.rm-yes {
  font-size: var(--text-xs); color: var(--err); font-weight: 600;
  padding: 4px 10px; border-radius: 6px;
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--err) 35%, transparent);
}
.rm-yes:hover { background: rgba(var(--err), 0.14); }
.rm-no { font-size: var(--text-xs); color: var(--fg-dim); padding: 4px 8px; border-radius: 6px; }
.rm-no:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }

/* add-provider preset chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip {
  padding: 4px 11px; border-radius: 99px;
  font-size: var(--text-xs); color: var(--fg-dim);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.09);
  transition: background 120ms ease, color 120ms ease, box-shadow 120ms ease;
}
.chip:hover { background: rgba(var(--tint), 0.06); color: var(--fg); }
.chip.is-active { color: var(--accent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

/* transient status flash */
.flash { display: inline-flex; align-items: center; gap: 5px; font-size: var(--text-sm); }
.flash.ok { color: var(--ok); }
.flash.busy { color: var(--fg-dim); }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.7s linear infinite; transform-origin: center; }

/* variant badge */
.badge {
  position: fixed; right: 14px; bottom: 12px; z-index: 999;
  padding: 5px 11px; border-radius: 99px;
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.02em;
  color: var(--fg-dim);
  background: rgba(var(--glass), 0.9);
  box-shadow: inset 0 0 0 1px rgba(var(--tint), 0.1), 0 4px 14px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.badge b { color: var(--accent); font-weight: 600; }

.fade-in { animation: fadein 150ms ease-out; }
@keyframes fadein { from { opacity: 0; transform: translateY(3px); } }
</style>
</head>
<body>
<div class="backdrop"></div>
<div class="overlay">
  <div class="modal">
    <!-- settings nav — context frame -->
    <nav class="nav">
      <div class="nav__search">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="7" cy="7" r="4.4"/><path d="M10.3 10.3L13.5 13.5"/></svg>
        Search settings
      </div>
      <button class="nav__item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="2.6"/><path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4"/></svg>General</button>
      <button class="nav__item is-active"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 5.5l6-3.2 6 3.2v5l-6 3.2-6-3.2z"/><path d="M8 8.4v5.3M2 5.5L8 8.4l6-2.9"/></svg>Model</button>
      <button class="nav__item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="5.5" cy="5" r="2.2"/><path d="M1.8 13c.4-2.4 1.9-3.7 3.7-3.7S8.8 10.6 9.2 13"/><circle cx="11.5" cy="5.8" r="1.8"/><path d="M10.9 9.3c1.9.1 3 1.3 3.3 3.2"/></svg>Workers</button>
      <button class="nav__item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M8 1.8l5 2v3.4c0 3.2-2.1 5.6-5 6.8-2.9-1.2-5-3.6-5-6.8V3.8z"/><path d="M5.8 8l1.6 1.6L10.5 6.4"/></svg>Permissions</button>
      <button class="nav__item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M12.5 5.5a4.5 4.5 0 1 0-9 0C3.5 9 2 10.5 2 10.5h12s-1.5-1.5-1.5-5z"/><path d="M6.5 13a1.6 1.6 0 0 0 3 0"/></svg>Notifications</button>
      <button class="nav__item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 4.5h10M3 8h10M3 11.5h10"/><circle cx="6" cy="4.5" r="1.3" fill="var(--bg)"/><circle cx="10.5" cy="8" r="1.3" fill="var(--bg)"/><circle cx="5" cy="11.5" r="1.3" fill="var(--bg)"/></svg>Advanced</button>
    </nav>

    <!-- Model section -->
    <div class="body">
      <h2 class="title">Providers</h2>
      <p class="subtitle">Model backends available to the composer and workers. Authenticate with an API key or a subscription login.</p>

      <div class="split">
        <div class="rail">
          <div class="rail__list" id="rail"></div>
          <button class="rail__add" id="addBtn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
            Add provider
          </button>
          <div class="rail__legend">
            <span class="lg-key"><i></i>key</span>
            <span class="lg-sub"><i></i>subscription</span>
            <span class="lg-none"><i></i>none</span>
          </div>
        </div>
        <div class="detail" id="detail"></div>
      </div>
    </div>
  </div>
</div>

<div class="badge"><b>V3</b> · master-detail — provider rail + detail pane</div>

<script>

  { id: "openai",    name: "OpenAI",           host: "api.openai.com",                    model: "gpt-5.5",                auth: "key",  account: "", plan: "", keyTail: "xW2m", hue: "#67c084" },
  { id: "gemini",    name: "Google Gemini",    host: "generativelanguage.googleapis.com", model: "gemini-3.1-pro-preview", auth: "none", account: "", plan: "", keyTail: "",     hue: "#8ab9f0" },
  { id: "qwen",      name: "Alibaba Qwen",     host: "dashscope-intl.aliyuncs.com",       model: "qwen3.7-max",            auth: "none", account: "", plan: "", keyTail: "",     hue: "#c8a2ff" },
  { id: "kimi",      name: "Moonshot Kimi",    host: "api.moonshot.ai",                   model: "kimi-k2.6",              auth: "sub",  account: "ibrahim@moonshot.ai", plan: "Kimi Pro", keyTail: "", hue: "#d97670" },
  { id: "glm",       name: "Zhipu GLM",        host: "api.z.ai",                          model: "glm-5.2",                auth: "none", account: "", plan: "", keyTail: "",     hue: "#5cb8c4" },
  { id: "grok",      name: "xAI Grok",         host: "api.x.ai",                          model: "grok-5",                 auth: "key",  account: "", plan: "", keyTail: "pR7c", hue: "#c4c4c4" },
];

const presets = [
  { id: "mistral",    label: "Mistral",    host: "api.mistral.ai",    model: "mistral-large-3" },
  { id: "openrouter", label: "OpenRouter", host: "openrouter.ai/api", model: "auto" },
  { id: "groq",       label: "Groq",       host: "api.groq.com",      model: "llama-4.5-405b" },
  { id: "custom",     label: "Custom…",    host: "",                  model: "" },
];

// ui state
let selected = "anthropic";     // provider id or "__add"
let authTab = {};               // per-provider segmented selection ("key" | "sub")
let replacingKey = {};          // per-provider: key input open even though a key is set
let confirmingRemove = false;
let addPreset = null;

const railEl = document.getElementById("rail");
const detailEl = document.getElementById("detail");

const esc = s => s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const statusLabel = { none: "Not configured", key: "API key", sub: "Subscription" };

const icons = {
  key:   '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5.5" cy="10.5" r="3"/><path d="M7.8 8.2L13.5 2.5M11 5l2 2M9 7l1.5 1.5"/></svg>',
  check: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 5"/></svg>',
  eye:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
  eyeOff:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M4 4l16 16"/></svg>',
  spin:  '<svg class="spin" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 2a6 6 0 1 0 6 6" stroke-opacity="0.35"/><path d="M8 2a6 6 0 0 1 6 6" stroke-dasharray="9 28"/></svg>',
  ext:   '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5H3.5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V9.5M9.5 2.5h4v4M13 3L7.5 8.5"/></svg>',
};

// ---------------------------------------------------------------------------
// rail
// ---------------------------------------------------------------------------
function renderRail() {
  railEl.innerHTML = providers.map(p => `
    <button class="prow st-${p.auth} ${selected === p.id ? "is-active" : ""}" data-id="${p.id}">
      <span class="prow__dot st-${p.auth}"></span>
      <span class="prow__name">${esc(p.name)}</span>
      <span class="prow__model">${esc(p.model || "—")}</span>
    </button>`).join("");
  document.getElementById("addBtn").classList.toggle("is-active", selected === "__add");
}

railEl.addEventListener("click", e => {
  const row = e.target.closest(".prow");
  if (!row) return;
  selected = row.dataset.id;
  confirmingRemove = false;
  render();
});
document.getElementById("addBtn").addEventListener("click", () => {
  selected = "__add";
  addPreset = null;
  render();
});

// ---------------------------------------------------------------------------
// detail — provider view
// ---------------------------------------------------------------------------
function glyph(p) {
  const initial = p.name.trim()[0].toUpperCase();
  return `<span class="dhead__glyph" style="color:${p.hue}; background: color-mix(in srgb, ${p.hue} 13%, transparent)">${initial}</span>`;
}

function authSection(p) {
  const tab = authTab[p.id] ?? (p.auth === "sub" ? "sub" : "key");
  const seg = `
    <div class="seg" role="tablist">
      <button class="seg__btn ${tab === "key" ? "is-active" : ""}" data-act="tab" data-tab="key">
        API Key ${p.auth === "key" ? '<span class="seg__st on-key"></span>' : ""}
      </button>
      <button class="seg__btn ${tab === "sub" ? "is-active" : ""}" data-act="tab" data-tab="sub">
        Subscription ${p.auth === "sub" ? '<span class="seg__st on-sub"></span>' : ""}
      </button>
    </div>`;

  let panel;
  if (tab === "key") {
    if (p.auth === "key" && !replacingKey[p.id]) {
      panel = `
        <div class="keyset fade-in">
          <span class="keyset__mask">sk-••••••••••••••••${esc(p.keyTail)}</span>
          <span class="keyset__ok">${icons.check} verified</span>
          <button class="keyset__replace" data-act="replace">Replace key</button>
        </div>
        <p class="hint">The key is stored locally in <span style="font-family:var(--font-mono)">~/.eos</span> and never leaves this machine.</p>`;
    } else {
      panel = `
        <div class="inp fade-in" style="margin-bottom:10px">
          <input id="keyInput" type="password" placeholder="Paste your ${esc(p.name)} API key…" spellcheck="false" autocomplete="new-password">
          <button class="inp__eye" data-act="eye" title="Show">${icons.eye}</button>
        </div>
        <div style="display:flex; align-items:center; gap:10px">
          <button class="btn-primary" data-act="saveKey" disabled>Test &amp; Save</button>
          ${p.auth === "key" ? '<button class="rm-no" data-act="cancelReplace">Cancel</button>' : ""}
          <span id="keyFlash"></span>
        </div>`;
    }
  } else {
    if (p.auth === "sub") {
      panel = `
        <div class="subcard fade-in">
          <span class="subcard__avatar">${esc(p.account[0].toUpperCase())}</span>
          <span class="subcard__who">
            <span class="subcard__acct">${esc(p.account)}</span>
            <span class="subcard__plan" style="display:block">${esc(p.plan)} · connected</span>
          </span>
          <button class="subcard__disc" data-act="disconnect">Disconnect</button>
        </div>
        <p class="hint">Requests are billed to this subscription — no API key needed while connected.</p>`;
    } else {
      panel = `
        <div class="fade-in" style="display:flex; align-items:center; gap:10px">
          <button class="btn-primary" data-act="connect">${icons.ext} Login with Subscription</button>
          <span id="subFlash"></span>
        </div>
        <p class="hint">Opens ${esc(p.name)}'s sign-in in your browser, then connects this workspace to your plan.</p>`;
    }
  }

  return `<div class="dsec"><div class="dsec__title">Authentication</div>${seg}<div class="authbox">${panel}</div></div>`;
}

function providerDetail(p) {
  return `
    <div class="fade-in">
      <div class="dhead">
        ${glyph(p)}
        <span>
          <span class="dhead__name" style="display:block">${esc(p.name)}</span>
          <span class="dhead__host">${esc(p.host)}</span>
        </span>
        <span class="dpill st-${p.auth}"><i></i>${statusLabel[p.auth]}</span>
      </div>

      ${authSection(p)}

      <div class="dsec">
        <div class="dsec__title">Connection</div>
        <div class="fields">
          <label for="fEndpoint">Endpoint</label>
          <span class="inp"><input id="fEndpoint" value="https://${esc(p.host)}" spellcheck="false"></span>
          <label for="fModel">Default model</label>
          <span class="inp"><input id="fModel" value="${esc(p.model)}" spellcheck="false"></span>
        </div>
      </div>

      <div class="dfoot">
        ${confirmingRemove ? `
          <span class="rm-confirm">Remove ${esc(p.name)} and its stored credential?</span>
          <button class="rm-yes" data-act="removeYes">Remove</button>
          <button class="rm-no" data-act="removeNo">Cancel</button>
        ` : `
          <button class="rm" data-act="remove">Remove provider…</button>
        `}
      </div>
    </div>`;
}

// ---------------------------------------------------------------------------
// detail — add-provider view
// ---------------------------------------------------------------------------
function addDetail() {
  const pre = presets.find(x => x.id === addPreset);
  return `
    <div class="fade-in">
      <div class="dhead">
        <span class="dhead__glyph" style="color:var(--fg-dim); background:rgba(var(--tint),0.06)">+</span>
        <span>
          <span class="dhead__name" style="display:block">Add a provider</span>
          <span class="dhead__host">pick a preset or configure a custom endpoint</span>
        </span>
      </div>

      <div class="dsec">
        <div class="dsec__title">Preset</div>
        <div class="chips">
          ${presets.map(x => `<button class="chip ${addPreset === x.id ? "is-active" : ""}" data-act="preset" data-preset="${x.id}">${esc(x.label)}</button>`).join("")}
        </div>
        <div class="fields">
          <label for="aName">Name</label>
          <span class="inp"><input id="aName" placeholder="Provider name" value="${pre && pre.id !== "custom" ? esc(pre.label) : ""}" spellcheck="false"></span>
          <label for="aEndpoint">Endpoint</label>
          <span class="inp"><input id="aEndpoint" placeholder="https://…" value="${pre && pre.host ? "https://" + esc(pre.host) : ""}" spellcheck="false"></span>
          <label for="aModel">Default model</label>
          <span class="inp"><input id="aModel" placeholder="model id" value="${pre ? esc(pre.model) : ""}" spellcheck="false"></span>
          <label for="aKey">API key</label>
          <span class="inp">
            <input id="aKey" type="password" placeholder="Paste API key — or connect below" spellcheck="false" autocomplete="new-password">
            <button class="inp__eye" data-act="eye" title="Show">${icons.eye}</button>
          </span>
        </div>
        <div style="display:flex; align-items:center; gap:10px; margin-top:14px">
          <button class="btn-primary" data-act="addSave" disabled>Test &amp; Add</button>
          <button class="btn-ghost" data-act="addSub">${icons.ext} Login with Subscription</button>
          <span id="addFlash"></span>
        </div>
        <p class="hint">Test runs one tiny completion against the endpoint before anything is saved.</p>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------------
// wiring
// ---------------------------------------------------------------------------
function render() {
  renderRail();
  detailEl.innerHTML = selected === "__add" ? addDetail() : providerDetail(providers.find(p => p.id === selected));
  wireInputs();
}

function wireInputs() {
  const key = document.getElementById("keyInput");
  if (key) {
    const save = detailEl.querySelector('[data-act="saveKey"]');
    key.addEventListener("input", () => { save.disabled = !key.value.trim(); });
    setTimeout(() => key.focus(), 0);
  }
  const aKey = document.getElementById("aKey");
  if (aKey) {
    const save = detailEl.querySelector('[data-act="addSave"]');
    const need = () => {
      const name = document.getElementById("aName").value.trim();
      const ep = document.getElementById("aEndpoint").value.trim();
      save.disabled = !(name && ep && aKey.value.trim());
    };
    ["aName", "aEndpoint", "aModel"].forEach(id => document.getElementById(id).addEventListener("input", need));
    aKey.addEventListener("input", need);
  }
}

function flash(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }

detailEl.addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const act = btn.dataset.act;
  const p = providers.find(x => x.id === selected);

  if (act === "tab") { authTab[selected] = btn.dataset.tab; render(); }

  else if (act === "eye") {
    const input = btn.parentElement.querySelector("input");
    const show = input.type === "password";
    input.type = show ? "text" : "password";
    btn.innerHTML = show ? icons.eyeOff : icons.eye;
  }

  else if (act === "replace") { replacingKey[selected] = true; render(); }
  else if (act === "cancelReplace") { delete replacingKey[selected]; render(); }

  else if (act === "saveKey") {
    const val = document.getElementById("keyInput").value.trim();
    btn.disabled = true;
    flash("keyFlash", `<span class="flash busy">${icons.spin} Testing connection…</span>`);
    setTimeout(() => {
      p.auth = "key";
      p.keyTail = val.slice(-4).padStart(4, "•");
      delete replacingKey[selected];
      render();
    }, 900);
  }

  else if (act === "connect") {
    btn.disabled = true;
    flash("subFlash", `<span class="flash busy">${icons.spin} Waiting for browser sign-in…</span>`);
    setTimeout(() => {
      p.auth = "sub";
      p.account = "ibrahimalbayrak812@gmail.com";
      p.plan = "Subscription";
      render();
    }, 1100);
  }

  else if (act === "disconnect") {
    p.auth = p.keyTail ? "key" : "none";
    p.account = ""; p.plan = "";
    render();
  }

  else if (act === "remove") { confirmingRemove = true; render(); }
  else if (act === "removeNo") { confirmingRemove = false; render(); }
  else if (act === "removeYes") {
    p.auth = "none"; p.keyTail = ""; p.account = ""; p.plan = "";
    confirmingRemove = false;
    delete authTab[selected]; delete replacingKey[selected];
    render();
  }

  else if (act === "preset") { addPreset = btn.dataset.preset; render(); }

  else if (act === "addSave") {
    btn.disabled = true;
    flash("addFlash", `<span class="flash busy">${icons.spin} Testing connection…</span>`);
    const name = document.getElementById("aName").value.trim();
    const host = document.getElementById("aEndpoint").value.trim().replace(/^https?:\/\//, "");
    const model = document.getElementById("aModel").value.trim() || "default";
    const tail = document.getElementById("aKey").value.trim().slice(-4).padStart(4, "•");
    setTimeout(() => {
      const id = "p" + (providers.length + 1);
      providers.push({ id, name, host, model, auth: "key", account: "", plan: "", keyTail: tail, hue: "#8a8a8a" });
      selected = id;
      addPreset = null;
      render();
    }, 900);
  }

  else if (act === "addSub") {
    flash("addFlash", `<span class="flash busy">${icons.spin} Waiting for browser sign-in…</span>`);
    const name = document.getElementById("aName").value.trim() || "New provider";
    const host = document.getElementById("aEndpoint").value.trim().replace(/^https?:\/\//, "") || "api.example.com";
    const model = document.getElementById("aModel").value.trim() || "default";
    setTimeout(() => {
      const id = "p" + (providers.length + 1);
      providers.push({ id, name, host, model, auth: "sub", account: "ibrahimalbayrak812@gmail.com", plan: "Subscription", keyTail: "", hue: "#8a8a8a" });
      selected = id;
      addPreset = null;
      render();
    }, 1100);
  }
});

render();
</script>
</body>
</html>
