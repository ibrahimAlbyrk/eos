<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="claude-manager — one operator, one orchestrator, many workers">
  <defs>
    <pattern id="grid-l" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#2a2520" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <radialGradient id="glow-l" cx="0.2" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#cf724d" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#cf724d" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#f5f0e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="#f5f0e6"/>
  <rect width="1280" height="320" fill="url(#grid-l)"/>
  <rect width="1280" height="320" fill="url(#glow-l)"/>

  <!-- eyebrow -->
  <g transform="translate(96, 64)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#cf724d" stroke-width="1.5"/>
    <text x="44" y="4" fill="#7a6f5e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.8">AN ATELIER FOR CLAUDE CODE  ·  ALPHA  ·  MMXXVI</text>
  </g>

  <!-- top-right tick -->
  <g transform="translate(1184, 64)">
    <text x="0" y="4" text-anchor="end" fill="#8a7f6b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.8">DAEMON · 127.0.0.1 : 7400</text>
    <circle cx="14" cy="0" r="3" fill="#cf724d"/>
  </g>

  <!-- wordmark -->
  <text x="96" y="192" fill="#2a2520" font-family="'Source Serif 4', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif" font-size="100" font-weight="500" letter-spacing="-2.6">claude-manager</text>

  <!-- tagline -->
  <text x="100" y="232" fill="#524a3e" font-family="'Source Serif 4', 'Iowan Old Style', Georgia, serif" font-size="22" font-style="italic" letter-spacing="0.2">one operator, one orchestrator, many workers.</text>

  <!-- bottom rule + chapter strip -->
  <line x1="96" y1="266" x2="1184" y2="266" stroke="#d6ceba" stroke-width="1"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="2.4" fill="#8a7f6b">
    <text x="96" y="292">I · WHY</text>
    <text x="240" y="292">II · ARCHITECTURE</text>
    <text x="460" y="292">III · FEATURES</text>
    <text x="640" y="292">IV · AUDIENCE</text>
    <text x="820" y="292">V · ROADMAP</text>
    <text x="1184" y="292" text-anchor="end" fill="#5f7d68">PTY · NEVER -p</text>
  </g>
</svg>
