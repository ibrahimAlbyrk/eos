  <text x="640" y="290" text-anchor="middle" font-family="&#39;Plus Jakarta Sans Variable&#39;,&#39;Plus Jakarta Sans&#39;,system-ui,-apple-system,&#39;Segoe UI&#39;,Roboto,sans-serif" font-size="86" font-weight="700" letter-spacing="-3.4" fill="#ededed">Eos</text>
  <text x="640" y="328" text-anchor="middle" font-family="&#39;Plus Jakarta Sans Variable&#39;,&#39;Plus Jakarta Sans&#39;,system-ui,-apple-system,&#39;Segoe UI&#39;,Roboto,sans-serif" font-size="18.5" font-weight="500" letter-spacing="0.1" fill="#8f8f8f">Orchestrate Claude Code agent swarms of any shape, from a single seat.</text>
  <g font-family="&#39;JetBrains Mono Variable&#39;,&#39;JetBrains Mono&#39;,ui-monospace,&#39;SF Mono&#39;,Menlo,monospace" font-size="11" letter-spacing="2.6" fill="#5a5a5a">
