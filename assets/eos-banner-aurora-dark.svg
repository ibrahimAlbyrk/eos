  </pattern>
  <g id="spokes" fill="url(#starFill)"><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(0)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(45)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(90)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(135)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(180)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(225)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(270)"></rect><rect x="-12" y="-98" width="24" height="86" rx="12" transform="rotate(315)"></rect></g>
