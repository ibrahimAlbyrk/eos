<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Eos</title>
<link rel="icon" type="image/png" href="./logo.png" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1815; overflow: hidden; }
  html[data-theme="light"], html[data-theme="light"] body { background: #f6f1e6; }
  #root { height: 100vh; width: 100vw; }
</style>
<script>
  // Sync theme bootstrap — runs before the bundle loads so the initial paint
  // matches the user's saved choice. No FOUC on reload.
  (function () {
    try {
      var t = localStorage.getItem("vb.theme");
      if (t !== "light" && t !== "dark") {
        t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (_) { document.documentElement.setAttribute("data-theme", "dark"); }
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
