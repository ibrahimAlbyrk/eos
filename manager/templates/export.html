<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eos Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════════════
     Eos Conversation Export — "Quiet Ledger"
     Neutral charcoal canvas · soft muted-green accent · editorial serif
     A vertical timeline (spine) threads every event.
     Self-contained · flips to a clean light document for print.
     ═══════════════════════════════════════════════════════════════════ */

  :root {
    /* neutral, faintly-cool charcoal (hue ~265, near-zero chroma) */
    --bg:        oklch(0.195 0.003 265);
    --surface:   oklch(0.240 0.004 265);
    --surface-2: oklch(0.285 0.004 265);
    --inset:     oklch(0.160 0.003 265);

    --line:      oklch(0.340 0.005 265);
    --line-soft: oklch(0.285 0.005 265);

    --t1: oklch(0.930 0.003 265);   /* primary text */
    --t2: oklch(0.760 0.004 265);   /* secondary   */
    --t3: oklch(0.605 0.005 265);   /* muted       */
    --t4: oklch(0.460 0.005 265);   /* faint       */

    /* accents — soft pastels, matched lightness/chroma (kept quiet) */
    --amber: oklch(0.810 0.050 158);   /* signature / user / active / links (soft green) */
    --sage:  oklch(0.800 0.045 245);   /* tool calls (soft blue) */
    --rust:  oklch(0.740 0.062 20);    /* errors (soft rose)     */

    --r-sm: 7px;
    --r-md: 12px;

    --gutter: 58px;   /* timestamp column */
    --spine:  76px;   /* x of the timeline line + markers */

    interpolate-size: allow-keywords;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body {
    font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--t1);
    line-height: 1.65;
    min-height: 100vh;
  }

  ::selection { background: color-mix(in oklch, var(--amber) 30%, transparent); color: #fff; }
  :focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; border-radius: 4px; }

  /* faint warmth bleeding from the top — the only "glow" in the piece */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(115% 55% at 50% -12%,
      color-mix(in oklch, var(--t1) 5%, transparent), transparent 60%);
  }

  /* ── page frame ──────────────────────────────────────────────────── */
  .archive {
    position: relative;
    z-index: 1;
    max-width: 1680px;
    margin: 0 auto;
    padding: 5.5rem 3rem 7rem;
  }

  /* ── header ──────────────────────────────────────────────────────── */
  .archive-header {
    padding-bottom: 2.75rem;
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--line-soft);
    animation: rise .5s .04s both cubic-bezier(.22,.68,.28,1);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: .6rem;
    font: 500 .7rem/1 'JetBrains Mono', ui-monospace, monospace;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--t3);
    margin-bottom: 1.1rem;
  }
  .eyebrow::before {
    content: '';
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 14%, transparent);
  }
  .archive-title {
    font: 400 3rem/1.02 'Instrument Serif', Georgia, 'Times New Roman', serif;
    letter-spacing: -.005em;
    color: var(--t1);
    margin-bottom: 1.25rem;
  }
  .archive-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: .85rem;
    font: 400 .78rem/1.5 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t3);
  }
  .archive-meta .meta-sep { color: var(--t4); }

  /* ── worker switcher (multi-worker only) ─────────────────────────── */
  .workers {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-bottom: 3rem;
    animation: rise .5s .1s both cubic-bezier(.22,.68,.28,1);
  }
  .wtab {
    display: inline-flex;
    align-items: center;
    gap: .55rem;
    padding: .5rem .9rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 999px;
    color: var(--t3);
    font: 500 .84rem/1 'Hanken Grotesk', system-ui, sans-serif;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .wtab:hover { color: var(--t1); background: var(--surface); }
  .wdot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--t4);
    transition: background .15s ease;
  }
  .wtab.orch .wdot { background: var(--amber); }
  .wloop {
    font: 400 .82rem/1 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t3);
    flex-shrink: 0;
  }
  .wcount {
    font: 400 .68rem/1 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    color: var(--t4);
  }
  .wtab.active {
    color: var(--t1);
    background: var(--surface);
    border-color: var(--line);
  }
  .wtab.active .wcount { color: var(--t3); }

  .panels { min-width: 0; }
  .panel { min-width: 0; }
  .panel[hidden] { display: none; }
  .panel.active { animation: rise .32s ease both; }

  /* ── panel header (which worker you're reading) ──────────────────── */
  .panel-head {
    display: flex;
    align-items: baseline;
    gap: .8rem;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
  }
  .panel-name {
    font: 400 1.6rem/1.2 'Instrument Serif', Georgia, serif;
    letter-spacing: 0;
    color: var(--t1);
  }
  .panel-badge {
    font: 500 .6rem/1 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: .13em;
    padding: .4em .75em;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--t3);
  }
  .panel-badge.orch {
    color: var(--amber);
    border-color: color-mix(in oklch, var(--amber) 40%, var(--line));
  }
  /* a worker that ran under a goal-loop — the ↻ glyph reads at a glance */
  .panel-badge.loop {
    display: inline-flex;
    align-items: center;
    gap: .5em;
    color: var(--t1);
    border-color: var(--line);
  }
  .panel-badge.loop::before {
    content: '\21BB';
    font-size: 1.15em;
    line-height: 0;
  }

  /* ── the timeline & its spine ────────────────────────────────────── */
  .timeline { position: relative; }
  .timeline::before {
    content: '';
    position: absolute;
    left: var(--spine); top: .8rem; bottom: .8rem;
    width: 1px;
    transform: translateX(-.5px);
    background: var(--line-soft);
  }

  .event {
    position: relative;
    display: grid;
    grid-template-columns: var(--gutter) 1fr;
    padding-bottom: 1.7rem;
  }
  .event:last-child { padding-bottom: 0; }
  .event-time {
    grid-column: 1;
    text-align: right;
    padding-right: .9rem;
    padding-top: .35rem;
    font: 400 .66rem/1.4 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    color: var(--t4);
    transition: color .15s ease;
  }
  .event:hover .event-time { color: var(--t3); }
  .event-body {
    grid-column: 2;
    min-width: 0;
    padding-left: calc(var(--spine) - var(--gutter) + 1.1rem);
    padding-top: .15rem;
  }

  /* markers sit on the spine */
  .event-marker {
    position: absolute;
    left: var(--spine); top: .5rem;
    transform: translateX(-50%);
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--t4);
    z-index: 1;
  }
  .m-user {
    background: var(--amber);
    border-color: var(--amber);
    box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 15%, transparent);
  }
  .m-assistant { border-color: var(--t3); }
  .m-assistant.orch { border-color: var(--amber); }
  .m-tool {
    width: 8px; height: 8px; top: .62rem;
    background: var(--t4); border: none;
  }
  .m-tool.err { background: var(--rust); }

  /* ── user message ────────────────────────────────────────────────── */
  .ev-user .event-body-inner {
    padding: .95rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-md);
    color: var(--t1);
    line-height: 1.7;
    overflow-wrap: break-word;
  }
  .ev-user .role-label { color: var(--amber); }

  .role-label {
    display: block;
    font: 500 .6rem/1 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: .16em;
    color: var(--t4);
    margin-bottom: .55rem;
  }

  /* ── assistant text — unboxed, flows open ────────────────────────── */
  .msg-assistant .msg-text.md-body { color: var(--t1); }

  /* ── markdown body ───────────────────────────────────────────────── */
  .md-body {
    font: 400 .96rem/1.75 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--t1);
  }
  .md-body p { margin: .7em 0; }
  .md-body p:first-child { margin-top: 0; }
  .md-body p:last-child { margin-bottom: 0; }
  .md-body h1, .md-body h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--t1);
    line-height: 1.2;
  }
  .md-body h1 { font-size: 1.7em; margin: 1.3em 0 .45em; }
  .md-body h2 { font-size: 1.4em; margin: 1.15em 0 .4em; }
  .md-body h3 {
    font: 600 1em/1.4 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--t2);
    margin: 1em 0 .3em;
  }
  .md-body strong { font-weight: 700; color: #fff; }
  .md-body em { font-style: italic; color: var(--t2); }
  .md-body a {
    color: var(--amber);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: color-mix(in oklch, var(--amber) 40%, transparent);
    transition: text-decoration-color .15s;
  }
  .md-body a:hover { text-decoration-color: var(--amber); }
  .md-body ul, .md-body ol { margin: .5em 0; padding-left: 1.4em; }
  .md-body li { margin: .3em 0; }
  .md-body li::marker { color: var(--amber); }
  .md-body hr { border: none; height: 1px; margin: 1.6em 0; background: var(--line-soft); }
  .md-body code {
    font: 400 .85em 'JetBrains Mono', ui-monospace, monospace;
    color: var(--sage);
    background: var(--inset);
    border: 1px solid var(--line-soft);
    border-radius: 5px;
    padding: .12em .4em;
  }
  .md-body pre {
    background: var(--inset);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-md);
    padding: 1rem 1.2rem;
    margin: .9em 0;
    overflow-x: auto;
  }
  .md-body pre code {
    color: #cfd4de; background: none; border: none; padding: 0;
    font-size: .8125rem; line-height: 1.65;
  }

  /* ── collapsibles: one shared quiet shape ────────────────────────── */
  details summary { list-style: none; cursor: pointer; }
  summary::-webkit-details-marker { display: none; }
  summary::marker { content: ''; }

  .thinking-block, .tool-call-block, .tool-result-block {
    margin: .5rem 0;
    border: 1px solid var(--line-soft);
    border-radius: var(--r-md);
    background: color-mix(in oklch, var(--surface) 45%, transparent);
    overflow: hidden;
    transition: border-color .15s ease, background .15s ease;
  }
  .thinking-block:hover, .tool-call-block:hover, .tool-result-block:hover { border-color: var(--line); }
  .thinking-block[open], .tool-call-block[open], .tool-result-block[open] {
    background: var(--surface);
    border-color: var(--line);
  }
  .thinking-block summary,
  .tool-call-block summary,
  .tool-result-block summary {
    display: flex; align-items: center; gap: .6rem;
    padding: .58rem .85rem;
    user-select: none;
  }
  .thinking-block summary::after,
  .tool-call-block summary::after,
  .tool-result-block summary::after {
    content: '';
    margin-left: auto;
    width: 6px; height: 6px; flex-shrink: 0;
    border-right: 1.5px solid var(--t4);
    border-bottom: 1.5px solid var(--t4);
    transform: rotate(-45deg);
    transition: transform .2s cubic-bezier(.4,0,.2,1);
  }
  details[open] summary::after { transform: rotate(45deg); }

  .lead-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--t4);
  }

  @keyframes reveal { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
  .thinking-block[open] .thinking-content,
  .tool-call-block[open] .tool-detail,
  .tool-result-block[open] .result-content { animation: reveal .2s ease both; }
  details::details-content { transition: height .22s ease, content-visibility .22s allow-discrete; }

  /* thinking */
  .thinking-block .lead-dot { background: var(--t3); }
  .thinking-label {
    font: italic 400 .82rem/1 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--t2);
  }
  .thinking-content {
    font: 400 .85rem/1.7 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--t2);
    white-space: pre-wrap; word-break: break-word;
    padding: .1rem 1rem 1rem 1.9rem;
    max-height: 380px; overflow-y: auto;
  }

  /* tool call */
  .tool-call-block .lead-dot { background: var(--sage); }
  .tool-call-block summary { font: 500 .8rem/1 'JetBrains Mono', ui-monospace, monospace; }
  .tool-call-block .tool-name { color: var(--sage); font-weight: 500; }
  .tool-detail {
    font: 400 .76rem/1.6 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t2);
    white-space: pre-wrap; word-break: break-word;
    background: var(--inset);
    border-radius: var(--r-sm);
    margin: 0 .6rem .6rem 1.9rem;
    padding: .75rem .9rem;
    max-height: 440px; overflow: auto;
  }

  /* tool result */
  .tool-result-block summary {
    font: 400 .76rem/1.5 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t3);
  }
  .tool-result-block .rp {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .result-content {
    font: 400 .76rem/1.6 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t2);
    white-space: pre-wrap; word-break: break-word;
    background: var(--inset);
    border-radius: var(--r-sm);
    padding: .75rem .9rem;
    margin: 0 .6rem .6rem 1.9rem;
    max-height: 420px; overflow-y: auto;
  }
  .tool-result-block:has(.result-error) { border-color: color-mix(in oklch, var(--rust) 30%, var(--line-soft)); }
  .lead-dot.result-error { background: var(--rust); }
  .result-err-label {
    font: 500 .6rem 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--rust);
    margin-right: .1em;
  }

  /* ── empty state ─────────────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 5rem 2rem; color: var(--t3); }
  .empty-state .empty-title {
    font: 400 1.6rem/1.2 'Instrument Serif', Georgia, serif;
    color: var(--t2);
    margin-bottom: .5rem;
  }
  .empty-state p { font-size: .9rem; }

  /* ── footer ──────────────────────────────────────────────────────── */
  .archive-footer {
    margin-top: 4.5rem;
    padding-top: 2.25rem;
    border-top: 1px solid var(--line-soft);
    font: 400 .72rem/1.6 'JetBrains Mono', ui-monospace, monospace;
    color: var(--t4);
  }
  .archive-footer a { color: var(--t3); text-decoration: none; transition: color .15s; }
  .archive-footer a:hover { color: var(--amber); }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ── scrollbars ──────────────────────────────────────────────────── */
  .thinking-content, .tool-detail, .result-content, .md-body pre {
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--t4); }
  ::-webkit-scrollbar-track { background: transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* ── responsive ──────────────────────────────────────────────────── */
  @media (max-width: 620px) {
    html { font-size: 15px; }
    :root { --gutter: 46px; --spine: 58px; }
    .archive { padding: 3rem 1.15rem 4rem; }
    .archive-title { font-size: 2.25rem; }
    .event-time { padding-right: .5rem; font-size: .6rem; }
  }

  /* ── print: clean light document ─────────────────────────────────── */
  @media print {
    @page { margin: 2cm 2.2cm; }
    :root {
      --bg: #fff; --surface: #f6f6f8; --surface-2: #eeeef2; --inset: #f3f3f6;
      --line: #d5d5dd; --line-soft: #e6e6ec;
      --t1: #1a1a1f; --t2: #3a3b44; --t3: #5c5e6a; --t4: #8a8c98;
      --amber: #2f7d55; --sage: #2f5da8; --rust: #b0433a;
    }
    html { font-size: 12px; }
    body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body::before { display: none !important; }
    *, *::before, *::after { box-shadow: none !important; animation: none !important; }
    .archive { max-width: 100%; padding: 0; }
    .workers { display: none; }
    .panel[hidden] { display: block !important; }
    .panel { margin-bottom: 2.5rem; page-break-inside: auto; }
    .event { break-inside: avoid; }
    .md-body pre code, .tool-detail, .result-content { color: #24242d !important; }
    .thinking-content, .tool-detail, .result-content, .md-body pre {
      max-height: none !important; overflow: visible !important;
    }
    a { color: var(--amber); }
  }
</style>
</head>
<body>
<div class="archive" id="export-container"></div>

<!--
  ═══════════════════════════════════════════════════════════════════════
  EXPORT DATA — the daemon replaces the {} inside this script tag
  with the full export JSON before sending the HTML to the browser.

  The JSON shape:
  {
    "exported_at": "ISO-8601 timestamp string",
    "workers": { "<worker_id>": { "name": "...", "is_orchestrator": true|false, "loop": { "status": "active|passed|exhausted|stopped" } | null }, ... },
    "events": [ <event>, <event>, ... ]
  }

  Every event: { "worker_id", "ts": <unix ms>, "type", "payload" }.
  This template renders TWO event shapes — mix them freely:

  A) FLAT typed events — payload holds the fields directly:
       user_message       payload.text            (markdown)
       assistant_message  payload.text            (markdown)
       thinking           payload.text
       tool_call          payload.name, payload.input
       tool_result        payload.content, payload.isError
  B) ENVELOPE events — a message carrying an ordered list of blocks:
       type "agent_event", payload { "type":"message", "role":"assistant"|"tool",
         "blocks": [ {type:"text",text}, {type:"reasoning",text},
                     {type:"tool_call",name,input}, {type:"tool_result",content,isError} ] }

  Field aliases accepted: text/content, input/args/arguments, isError/is_error/error,
  name/tool/tool_name, content/output/result. Unknown event types are ignored.
  ═══════════════════════════════════════════════════════════════════════
-->
<script id="export-data" type="application/json">{}</script>

<script>
(function() {
  'use strict';

  /* ── helpers ─────────────────────────────────────────────────────── */
  var MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function fmtTime(ms) {
    var d = new Date(ms);
    return pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
  }

  function fmtDate(ms) {
    var d = new Date(ms);
    return MONTHS[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
  }

  function fmtDateTime(iso) {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return MONTHS_LONG[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear() +
           ' · ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ' UTC';
  }

  function escHtml(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
  }

  function prettyJson(obj) {
    try { return JSON.stringify(obj, null, 2); } catch(e) { return String(obj); }
  }

  /* ── minimal markdown renderer ───────────────────────────────────── */
  // Only http(s)/mailto and relative/anchor links survive — javascript: and
  // other active schemes are dropped (mirrors the app's DOMPurify href policy).
  function safeUrl(u) {
    var s = String(u).trim();
    if (/^(https?:|mailto:)/i.test(s)) return s;
    if (/^[/#.?]/.test(s)) return s;
    if (/^[a-z][a-z0-9+.-]*:/i.test(s)) return '#';
    return s;
  }
  function inlineMd(raw) {
    var slots = [];
    var s = raw.replace(/`([^`\n]+)`/g, function(_, code) {
      slots.push('<code>' + escHtml(code) + '</code>');
      return '\x00' + (slots.length - 1) + '\x00';
    });
    s = s.split(/(\x00\d+\x00)/).map(function(part) {
      return /^\x00\d+\x00$/.test(part) ? part
        : part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }).join('');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
    s = s.replace(/_([^_\n]+?)_/g,'<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, label, url) {
      return '<a href="' + escHtml(safeUrl(url)) + '" target="_blank" rel="noopener">' + label + '</a>';
    });
    s = s.replace(/\x00(\d+)\x00/g, function(_, i) { return slots[+i]; });
    return s;
  }

  function md(text) {
    if (!text) return '';
    var lines = text.split('\n');
    var out = '';
    var i = 0;
    while (i < lines.length) {
      var line = lines[i];
      if (/^```/.test(line)) {
        var lang = line.slice(3).trim();
        var code = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
        i++;
        out += '<pre><code' + (lang ? ' class="lang-' + escHtml(lang) + '"' : '') + '>' + escHtml(code.join('\n')) + '</code></pre>';
        continue;
      }
      var hm = line.match(/^(#{1,3})\s+(.+)$/);
      if (hm) {
        var lv = hm[1].length;
        out += '<h' + lv + '>' + inlineMd(hm[2]) + '</h' + lv + '>'; i++; continue;
      }
      if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { out += '<hr>'; i++; continue; }
      if (/^[-*+] /.test(line)) {
        out += '<ul>';
        while (i < lines.length && /^[-*+] /.test(lines[i])) {
          out += '<li>' + inlineMd(lines[i].replace(/^[-*+] /, '')) + '</li>'; i++;
        }
        out += '</ul>'; continue;
      }
      if (/^\d+\. /.test(line)) {
        out += '<ol>';
        while (i < lines.length && /^\d+\. /.test(lines[i])) {
          out += '<li>' + inlineMd(lines[i].replace(/^\d+\. /, '')) + '</li>'; i++;
        }
        out += '</ol>'; continue;
      }
      if (line.trim() === '') { i++; continue; }
      var para = [];
      while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,3} |```|[-*+] |\d+\. |(-{3,}|\*{3,}|_{3,})$)/.test(lines[i])) {
        para.push(lines[i]); i++;
      }
      if (para.length) out += '<p>' + inlineMd(para.join(' ')) + '</p>';
    }
    return out;
  }

  /* ── header ──────────────────────────────────────────────────────── */
  function renderHeader(data, stats) {
    var workerCount = stats ? stats.workers : (data.workers ? Object.keys(data.workers).length : 0);
    var exportedDate = data.exported_at ? fmtDateTime(data.exported_at) : 'Unknown date';
    var meta = '<span>' + escHtml(exportedDate) + '</span>' +
      '<span class="meta-sep">/</span>' +
      '<span>' + workerCount + ' ' + (workerCount === 1 ? 'worker' : 'workers') + '</span>';
    if (stats && stats.events != null) {
      meta += '<span class="meta-sep">/</span>' +
        '<span>' + stats.events + ' ' + (stats.events === 1 ? 'event' : 'events') + '</span>';
    }
    return '<header class="archive-header">' +
      '<span class="eyebrow">Eos Archive</span>' +
      '<h1 class="archive-title">Conversation Export</h1>' +
      '<div class="archive-meta">' + meta + '</div>' +
      '</header>';
  }

  /* ── field-alias helpers (tolerate naming variants across exporters) ── */
  function pick(o) {
    for (var i = 1; i < arguments.length; i++) {
      if (o && o[arguments[i]] != null) return o[arguments[i]];
    }
    return undefined;
  }
  function asText(v) { return v == null ? '' : (typeof v === 'string' ? v : prettyJson(v)); }
  function blocksHaveError(blocks) {
    for (var e = 0; e < blocks.length; e++) {
      var b = blocks[e];
      if (b && b.type === 'tool_result' && pick(b, 'isError', 'is_error', 'error')) return true;
    }
    return false;
  }

  /* ── one block inside a message (used by both event shapes) ──────── */
  function renderBlock(b) {
    if (!b || !b.type) return '';
    if (b.type === 'text') {
      var txt = asText(pick(b, 'text', 'content'));
      if (!txt) return '';
      return '<div class="msg-text md-body">' + md(txt) + '</div>';
    }
    if (b.type === 'reasoning' || b.type === 'thinking') {
      var rtxt = asText(pick(b, 'text', 'content'));
      if (!rtxt) return '';
      return '<details class="thinking-block">' +
        '<summary><span class="lead-dot"></span><span class="thinking-label">Thinking</span></summary>' +
        '<div class="thinking-content">' + escHtml(rtxt) + '</div>' +
        '</details>';
    }
    if (b.type === 'tool_call') {
      var name = pick(b, 'name', 'tool', 'tool_name') || 'unknown';
      var input = asText(pick(b, 'input', 'args', 'arguments'));
      return '<details class="tool-call-block">' +
        '<summary><span class="lead-dot"></span><span class="tool-name">' + escHtml(name) + '</span></summary>' +
        (input ? '<div class="tool-detail">' + escHtml(input) + '</div>' : '') +
        '</details>';
    }
    if (b.type === 'tool_result') {
      var content = asText(pick(b, 'content', 'output', 'result'));
      var isErr = !!pick(b, 'isError', 'is_error', 'error');
      var preview = content.length > 120 ? content.substring(0,120).replace(/\n/g,' ') + '\u2026' : content.replace(/\n/g,' ');
      var dotCls = 'lead-dot' + (isErr ? ' result-error' : '');
      return '<details class="tool-result-block">' +
        '<summary><span class="' + dotCls + '"></span>' +
        (isErr ? '<span class="result-err-label">error</span>' : '') +
        '<span class="rp">' + escHtml(preview || '(empty)') + '</span></summary>' +
        (content ? '<div class="result-content">' + escHtml(content) + '</div>' : '') +
        '</details>';
    }
    return '';
  }

  /* ── small wrappers so both shapes share one row layout ──────────── */
  function rowAssistant(timeEl, isOrch, body) {
    return '<div class="event ev-assistant">' + timeEl +
      '<span class="event-marker m-assistant' + (isOrch ? ' orch' : '') + '"></span>' +
      '<div class="event-body msg-assistant">' + body + '</div></div>';
  }
  function rowThinking(timeEl, isOrch, body) {
    return '<div class="event ev-assistant">' + timeEl +
      '<span class="event-marker m-assistant' + (isOrch ? ' orch' : '') + '"></span>' +
      '<div class="event-body">' + body + '</div></div>';
  }
  function rowTool(timeEl, hasErr, body) {
    return '<div class="event ev-tool">' + timeEl +
      '<span class="event-marker m-tool' + (hasErr ? ' err' : '') + '"></span>' +
      '<div class="event-body">' + body + '</div></div>';
  }

  /* ── one event row on the timeline ───────────────────────────────── */
  function renderEvent(ev, isOrch) {
    if (!ev) return null;
    var timeEl = '<div class="event-time" title="' + escHtml(fmtDate(ev.ts)) + '">' + escHtml(fmtTime(ev.ts)) + '</div>';
    var p = ev.payload || {};
    var type = ev.type;

    // ── User message (flat, or a message envelope with role "user") ──
    if (type === 'user_message' || ((type === 'agent_event' || type === 'message') && p.role === 'user')) {
      var text = asText(pick(p, 'text', 'content'));
      return '<div class="event ev-user">' + timeEl +
        '<span class="event-marker m-user"></span>' +
        '<div class="event-body"><div class="event-body-inner">' +
          '<span class="role-label">User</span>' +
          '<div class="msg-text md-body">' + md(text) + '</div>' +
        '</div></div>' +
        '</div>';
    }

    // ── ENVELOPE: agent_event / message carrying an ordered block list ──
    if (type === 'agent_event' || type === 'message') {
      if (p.type && p.type !== 'message') return null;
      if (p.role !== 'assistant' && p.role !== 'tool') return null;
      var blocks = p.blocks || [];
      var body = '';
      for (var k = 0; k < blocks.length; k++) body += renderBlock(blocks[k]);
      if (!body) return null;
      return p.role === 'tool'
        ? rowTool(timeEl, blocksHaveError(blocks), body)
        : rowAssistant(timeEl, isOrch, body);
    }

    // ── FLAT typed events ────────────────────────────────────────────
    if (type === 'assistant_message') {
      var abody = '';
      if (p.blocks && p.blocks.length) {
        for (var bi = 0; bi < p.blocks.length; bi++) abody += renderBlock(p.blocks[bi]);
      } else {
        var atxt = asText(pick(p, 'text', 'content'));
        if (atxt) abody = '<div class="msg-text md-body">' + md(atxt) + '</div>';
      }
      return abody ? rowAssistant(timeEl, isOrch, abody) : null;
    }
    if (type === 'thinking' || type === 'reasoning') {
      var tbody = renderBlock({ type: 'thinking', text: pick(p, 'text', 'content') });
      return tbody ? rowThinking(timeEl, isOrch, tbody) : null;
    }
    if (type === 'tool_call') {
      var cbody = renderBlock({ type: 'tool_call', name: pick(p, 'name', 'tool', 'tool_name'), input: pick(p, 'input', 'args', 'arguments') });
      return cbody ? rowTool(timeEl, false, cbody) : null;
    }
    if (type === 'tool_result') {
      var isErr = !!pick(p, 'isError', 'is_error', 'error');
      var rbody = renderBlock({ type: 'tool_result', content: pick(p, 'content', 'output', 'result'), isError: isErr });
      return rbody ? rowTool(timeEl, isErr, rbody) : null;
    }

    return null; // spawn, state, lifecycle, or unknown — skipped
  }

  /* ── one worker's rows → { html, count } ─────────────────────────── */
  function renderWorkerBody(events, isOrch) {
    var sorted = (events || []).slice().sort(function(a,b) { return a.ts - b.ts; });
    var html = '', count = 0;
    for (var i = 0; i < sorted.length; i++) {
      var row = renderEvent(sorted[i], isOrch);
      if (row) { html += row; count++; }
    }
    return { html: html, count: count };
  }

  /* ── worker switcher tab ─────────────────────────────────────────── */
  function renderWorkerTab(worker, workerId, panelId, active, count) {
    var role = worker.is_orchestrator ? ' orch' : '';
    var roleText = worker.is_orchestrator ? 'Orchestrator' : 'Worker';
    return '<button class="wtab' + role + (active ? ' active' : '') + '" type="button"' +
      ' role="tab" aria-selected="' + (active ? 'true' : 'false') + '" aria-controls="' + panelId + '"' +
      ' data-target="' + panelId + '" title="' + escHtml((worker.name || workerId) + ' · ' + roleText) + '">' +
      '<span class="wdot"></span>' +
      '<span class="wname">' + escHtml(worker.name || workerId) + '</span>' +
      (worker.loop ? '<span class="wloop" title="Ran under a goal-loop">↻</span>' : '') +
      '<span class="wcount">' + count + '</span>' +
      '</button>';
  }

  /* ── conversation panel for one worker ───────────────────────────── */
  function renderWorkerPanel(worker, workerId, bodyHtml, panelId, active) {
    var badgeClass = worker.is_orchestrator ? 'panel-badge orch' : 'panel-badge';
    var badgeText  = worker.is_orchestrator ? 'Orchestrator' : 'Worker';
    return '<section class="panel' + (active ? ' active' : '') + '"' +
      ' id="' + panelId + '" role="tabpanel"' + (active ? '' : ' hidden') + '>' +
      '<div class="panel-head">' +
        '<span class="panel-name">' + escHtml(worker.name || workerId) + '</span>' +
        '<span class="' + badgeClass + '">' + badgeText + '</span>' +
        (worker.loop ? '<span class="panel-badge loop">Loop · ' + escHtml(worker.loop.status) + '</span>' : '') +
      '</div>' +
      '<div class="timeline">' + bodyHtml + '</div>' +
      '</section>';
  }

  /* ── main ────────────────────────────────────────────────────────── */
  function main() {
    var container  = document.getElementById('export-container');
    var dataScript = document.getElementById('export-data');
    if (!dataScript) { container.innerHTML = '<div class="empty-state"><p>Missing export data.</p></div>'; return; }

    var data;
    try { data = JSON.parse(dataScript.textContent); }
    catch(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-title">Invalid Data</div><p>' + escHtml(e.message) + '</p></div>';
      return;
    }

    if (!data.workers && !data.events) {
      container.innerHTML = renderHeader(data || {}) +
        '<div class="empty-state"><div class="empty-title">No Export Data</div></div>' +
        '<footer class="archive-footer">Eos · <a href="https://github.com/ibrahimalbyrk/eos">github.com/ibrahimalbyrk/eos</a></footer>';
      return;
    }

    var workers = data.workers || {};
    var events  = data.events  || [];
    var globalSorted = events.slice().sort(function(a,b) { return a.ts - b.ts; });

    var workerEvents = {}, workerOrder = [], seen = {};
    for (var i = 0; i < globalSorted.length; i++) {
      var wid = globalSorted[i].worker_id;
      if (!seen[wid]) {
        seen[wid] = true;
        workerEvents[wid] = [];
        if (workers[wid] && workers[wid].is_orchestrator) workerOrder.unshift(wid);
        else workerOrder.push(wid);
      }
      workerEvents[wid].push(globalSorted[i]);
    }
    for (var id in workers) {
      if (workers.hasOwnProperty(id) && !seen[id]) {
        workerEvents[id] = [];
        if (workers[id].is_orchestrator) workerOrder.unshift(id); else workerOrder.push(id);
      }
    }

    // Build a switcher tab + conversation panel per worker with visible events.
    var tabsHtml = '', panelsHtml = '', idx = 0, totalEvents = 0;
    for (var j = 0; j < workerOrder.length; j++) {
      var wId = workerOrder[j];
      var worker = workers[wId] || { name: wId, is_orchestrator: false };
      var built = renderWorkerBody(workerEvents[wId] || [], !!worker.is_orchestrator);
      if (!built.html) continue;
      var active = idx === 0;
      var panelId = 'wpanel-' + idx;
      tabsHtml   += renderWorkerTab(worker, wId, panelId, active, built.count);
      panelsHtml += renderWorkerPanel(worker, wId, built.html, panelId, active);
      totalEvents += built.count;
      idx++;
    }

    var html = renderHeader(data, { workers: idx, events: totalEvents });
    if (idx === 0) {
      html += '<div class="empty-state"><div class="empty-title">No Conversation</div>' +
        '<p>This export contains no displayable messages.</p></div>';
    } else if (idx === 1) {
      html += '<div class="panels solo">' + panelsHtml + '</div>';
    } else {
      html += '<nav class="workers" role="tablist" aria-label="Workers">' + tabsHtml + '</nav>' +
        '<div class="panels">' + panelsHtml + '</div>';
    }
    html += '<footer class="archive-footer">Eos · <a href="https://github.com/ibrahimalbyrk/eos">github.com/ibrahimalbyrk/eos</a></footer>';
    container.innerHTML = html;

    // Switcher: show the selected worker's panel, hide the rest.
    var tabs = container.querySelectorAll('.wtab');
    if (tabs.length > 1) {
      var panels = container.querySelectorAll('.panel');
      var activate = function(panelId) {
        for (var t = 0; t < tabs.length; t++) {
          var on = tabs[t].getAttribute('data-target') === panelId;
          tabs[t].classList.toggle('active', on);
          tabs[t].setAttribute('aria-selected', on ? 'true' : 'false');
        }
        for (var p = 0; p < panels.length; p++) {
          var onPanel = panels[p].id === panelId;
          panels[p].classList.toggle('active', onPanel);
          if (onPanel) panels[p].removeAttribute('hidden');
          else panels[p].setAttribute('hidden', '');
        }
      };
      for (var t2 = 0; t2 < tabs.length; t2++) {
        tabs[t2].addEventListener('click', function() { activate(this.getAttribute('data-target')); });
      }
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', main);
  else main();
})();
</script>
</body>
</html>
